<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swift POS - Ultimate ERP System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Padauk:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'Padauk', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },

            }
        }

    <style>
        /* Print Fix */
        @media print { 
            @page { margin: 0; }
            html, body { height: auto !important; overflow: visible !important; background: white !important; }
            body * { visibility: hidden; } 
            #r-p, #r-p * { visibility: visible; } 
            #r-p { 
                position: absolute; left: 0; top: 0; width: 58mm; font-size: 12px; 
                color: black !important; background: white !important; display: block !important; 
                margin: 0; padding: 10px 5px; 
            } 
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { touch-action: manipulation; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 h-[100dvh] flex flex-col text-slate-800 overflow-hidden w-full selection:bg-brand-500/20">

<div id="pos-login" class="flex items-center justify-center h-[100dvh] bg-slate-50 z-50 absolute inset-0 p-4">
    <div class="bg-white p-8 sm:p-12 rounded-3xl shadow-xl shadow-slate-200/50 w-full max-w-md border border-slate-100 text-center relative">
        <div class="w-16 h-16 bg-brand-50 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm border border-brand-100">
            <i class="ph ph-storefront text-4xl text-brand-600"></i>
        </div>
        <h2 class="text-2xl sm:text-3xl font-black mb-2 text-slate-900 tracking-tight">Sign in to Workspace</h2>
        <p class="text-slate-500 mb-8 text-sm font-medium">Swift POS & ERP System</p>
        
        <div class="space-y-4">
            <input id="u" type="text" placeholder="Username" class="w-full px-5 py-3.5 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 transition text-sm sm:text-base font-medium placeholder-slate-400">
            <input id="p" type="password" placeholder="Password" class="w-full px-5 py-3.5 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 transition text-sm sm:text-base font-medium placeholder-slate-400">
            <button id="l-btn" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl shadow-md shadow-brand-600/20 active:scale-[0.98] transition-all text-sm sm:text-base mt-2">Sign In</button>
            <p id="l-err" class="text-red-500 text-xs mt-4 hidden bg-red-50 border border-red-100 p-3 rounded-lg font-medium"></p>
        </div>
    </div>
</div>

                <h1 class="font-bold text-slate-900 text-sm truncate max-w-[80px]">SWIFT POS</h1>
            </div>

            </div>
        </header>

            </div>
            <main class="flex-1 overflow-y-auto p-3 sm:p-4 lg:p-6 pb-24 lg:pb-6">

        </div>

            <button onclick="toggleMobileCart()" class="bg-brand-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-md shadow-brand-600/20 active:scale-95 transition-transform"><i class="ph ph-shopping-bag text-lg"></i> <span data-i18n="view_order">View Order</span></button>

    </div>

        <button id="btn-purchases-m" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-slate-600 text-sm"><i class="ph ph-shopping-cart text-lg"></i> <span data-i18n="purchases">Purchases</span></button>
        <button id="btn-customers-m" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-slate-600 text-sm"><i class="ph ph-users text-lg"></i> <span data-i18n="customers">Customers</span></button>
        <button id="btn-debts-m" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-slate-600 text-sm"><i class="ph ph-credit-card text-lg"></i> <span data-i18n="debts">Debts</span></button>
        <button id="btn-expenses-m" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-slate-600 text-sm"><i class="ph ph-money text-lg"></i> <span data-i18n="expenses">Expenses</span></button>
        <button id="btn-payroll-m" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-slate-600 text-sm"><i class="ph ph-users-three text-lg"></i> <span data-i18n="payroll">Payroll</span></button>
        <button id="btn-history-m" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-slate-600 text-sm"><i class="ph ph-receipt text-lg"></i> <span data-i18n="history">Transactions</span></button>
        <button id="btn-reports-m" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-slate-600 text-sm"><i class="ph ph-chart-line-up text-lg"></i> <span data-i18n="reports">Reports</span></button>
        <button id="btn-settings-m" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-slate-600 text-sm"><i class="ph ph-gear text-lg"></i> <span data-i18n="settings">Settings</span></button>
        <div class="border-t border-slate-100 mt-2 pt-2"><button id="lo-btn-m" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-red-600 text-sm"><i class="ph ph-sign-out text-lg"></i> <span data-i18n="signout">Sign Out</span></button></div>
    `;

    const updateText = (id, txt) => { const el = document.getElementById(id); if (el) el.innerText = txt; };

    window.toggleMobileCart = () => {
        const p = document.getElementById('cart-panel'); const o = document.getElementById('cart-overlay');
        if (p.classList.contains('translate-x-full')) { o.classList.remove('hidden'); setTimeout(()=>o.classList.remove('opacity-0'),10); p.classList.remove('translate-x-full'); } 
        else { p.classList.add('translate-x-full'); o.classList.add('opacity-0'); setTimeout(()=>o.classList.add('hidden'),300); }
    };
    window.toggleMobileMenu = () => {
        const m = document.getElementById('mob-menu'); const o = document.getElementById('mob-menu-overlay');
        if (m.classList.contains('-translate-x-full')) { o.classList.remove('hidden'); setTimeout(()=>o.classList.remove('opacity-0'),10); m.classList.remove('-translate-x-full'); } 
        else { m.classList.add('-translate-x-full'); o.classList.add('opacity-0'); setTimeout(()=>o.classList.add('hidden'),300); }
    };

    // AUTO LOGIN
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data(); 
                    if (new Date() > new Date(data.expiryDate)) { signOut(auth); return; }
                    shop_id = data.shopId; shop_name = data.shopName; userRole = data.role || 'staff'; 
                    updateText('s-name', shop_name);
                    document.getElementById('pos-login').style.display = 'none'; 
                    const mainApp = document.getElementById('pos-main'); mainApp.classList.remove('hidden'); mainApp.style.display = 'flex';
                    loadProducts(); loadSettings();
                }
            } catch (e) { console.error(e); }
        }
    });

    if (localStorage.getItem('master_logged_in') === 'true') {
        shop_id = 'master_shop'; shop_name = 'SWIFT POS'; userRole = 'owner'; updateText('s-name', shop_name);
        document.getElementById('pos-login').style.display = 'none'; 
        const mainApp = document.getElementById('pos-main'); mainApp.classList.remove('hidden'); mainApp.style.display = 'flex';
        loadProducts(); loadSettings();
    }

    // LOGIN
    document.getElementById('l-btn').onclick = async () => {
        const u = document.getElementById('u').value.trim(); const p = document.getElementById('p').value; const err = document.getElementById('l-err'); if(err) err.classList.add('hidden');
        if (u === 'master' && p === 'master123') {
            localStorage.setItem('master_logged_in', 'true');
            shop_id = 'master_shop'; shop_name = 'SWIFT POS'; userRole = 'owner'; updateText('s-name', shop_name);
            document.getElementById('pos-login').style.display = 'none'; document.getElementById('pos-main').classList.remove('hidden'); document.getElementById('pos-main').style.display = 'flex';
            loadProducts(); loadSettings(); return;
        }
        try {
            document.getElementById('l-btn').innerText = "Authenticating...";
            const cred = await signInWithEmailAndPassword(auth, `${u}@pos.local`, p);
            const userDoc = await getDoc(doc(db, "users", cred.user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data(); if (new Date() > new Date(data.expiryDate)) { signOut(auth); throw new Error("Subscription Expired!"); }
                shop_id = data.shopId; shop_name = data.shopName; userRole = data.role || 'staff'; updateText('s-name', shop_name);
                document.getElementById('pos-login').style.display = 'none'; document.getElementById('pos-main').classList.remove('hidden'); document.getElementById('pos-main').style.display = 'flex';
                loadProducts(); loadSettings();
            }
        } catch (e) { if(err){ err.innerText = e.message; err.classList.remove('hidden'); } document.getElementById('l-btn').innerText = "Sign In"; }
    };
    
    const handleLogout = () => { localStorage.removeItem('master_logged_in'); signOut(auth); location.reload(); };
    document.getElementById('lo-btn').onclick = handleLogout; document.getElementById('lo-btn-m').onclick = handleLogout;

    // SETTINGS
    async function loadSettings() {
        if(!shop_id) return;
        const sDoc = await getDoc(doc(db, "shops", shop_id, "settings", "general"));
        if(sDoc.exists()) { shop_settings = sDoc.data(); updateText('s-name', shop_settings.shopName || shop_name); shop_name = shop_settings.shopName || shop_name; }
    }

    // PRODUCTS
    function loadProducts() {
        if (!shop_id) return;
        onSnapshot(query(collection(db, "shops", shop_id, "products"), orderBy("name")), (snap) => {
            allProducts = []; const categories = new Set();
            snap.forEach(d => { const p = { id: d.id, ...d.data() }; allProducts.push(p); if (p.category) categories.add(p.category.trim()); });
            renderCategorySidebar(['All', ...Array.from(categories)]); renderProductGrid();
        });
    }

    function renderCategorySidebar(categories) {
        const sidebar = document.getElementById('category-sidebar'); if (!sidebar) return; sidebar.innerHTML = '';
        categories.forEach(cat => {
            const isActive = cat === currentCategory;
            const activeClass = isActive ? 'bg-slate-900 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50';
            sidebar.innerHTML += `<button onclick="setCategory('${cat}')" class="${activeClass} px-4 py-2 rounded-xl flex items-center gap-2 transition-all shrink-0 whitespace-nowrap"><span class="text-xs sm:text-sm font-bold">${cat === 'All' ? (currentLang==='mm'?'အားလုံး':'All') : cat}</span></button>`;
        });
    }

    window.setCategory = (cat) => { currentCategory = cat; renderCategorySidebar(['All', ...Array.from(new Set(allProducts.map(p => p.category).filter(Boolean)))]); renderProductGrid(); };

    function renderProductGrid() {
        const grid = document.getElementById('p-grid'); if (!grid) return; grid.innerHTML = '';
        const filteredProducts = currentCategory === 'All' ? allProducts : allProducts.filter(p => p.category === currentCategory);
        if (filteredProducts.length === 0) { grid.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center text-center py-20 opacity-60"><i class="ph ph-package text-4xl text-slate-400 mb-2"></i><p class="text-slate-600 font-bold">No items available</p></div>`; return; }

        filteredProducts.forEach(p => {
            const isLow = p.quantity <= (p.lowStockThreshold || 5);
            let isExpiring = false;
            if(p.expiryDate) { const daysLeft = (new Date(p.expiryDate) - new Date()) / (1000 * 60 * 60 * 24); if(daysLeft <= 30) isExpiring = true; }
            
            const stockClass = isLow ? 'text-red-600 bg-red-50 border-red-100' : 'text-slate-500 bg-slate-100 border-transparent';
            const expBadge = isExpiring ? `<span class="absolute top-2 left-2 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded shadow-sm flex items-center gap-1"><i class="ph ph-warning-circle"></i> EXP Soon</span>` : '';
            
            grid.innerHTML += `
            <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden hover:shadow-lg hover:-translate-y-1 cursor-pointer transition-all flex flex-col relative" onclick="addToCart('${p.id}')">
                <div class="h-24 sm:h-28 bg-slate-50 flex items-center justify-center relative border-b border-slate-100">
                    <div class="text-slate-400 text-2xl font-black opacity-20 uppercase">${p.name.substring(0,2)}</div>
                    ${p.category ? `<span class="absolute top-2 right-2 bg-white text-[9px] font-bold px-2 py-0.5 rounded-lg text-slate-600 border border-slate-200">${p.category}</span>` : ''}
                    ${expBadge}
                </div>
                <div class="p-3 sm:p-4 flex flex-col flex-1 justify-between">
                    <div class="text-sm font-bold leading-tight mb-1 text-slate-800 line-clamp-2">${p.name} ${p.variant ? `(${p.variant})` : ''}</div>
                    <div class="flex items-end justify-between mt-auto">
                        <div class="text-brand-600 font-black text-sm sm:text-base">${(p.retailPrice || p.price || 0).toLocaleString()} Ks</div>
                        <div class="text-[9px] px-1.5 py-0.5 rounded border font-bold ${stockClass}">${p.quantity} ${p.unit || ''}</div>
                    </div>
                </div>
            </div>`;
        });
    }

    // CART
    window.addToCart = async (productId) => {
        const product = allProducts.find(p => p.id === productId); if (!product) return;
        const existing = window.cart.find(item => item.id === product.id);
        if (existing) { if (existing.qty < product.quantity) existing.qty++; else return alert('Out of stock!'); } 
        else { if (product.quantity > 0) window.cart.push({ ...product, qty: 1 }); else return alert('Out of stock!'); }
        renderCart();
    };

    document.getElementById('barcode-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const code = e.target.value.trim().toLowerCase();
            if (code) { const p = allProducts.find(p => p.sku && p.sku.toLowerCase() === code); if (p) addToCart(p.id); else alert('Not found: ' + code); }
            e.target.value = '';
        }
    });

    window.clearCart = () => { window.cart = []; renderCart(); };

    window.renderCart = () => {
        const list = document.getElementById('c-list'); if (!list) return; list.innerHTML = '';
        if (window.cart.length === 0) { list.innerHTML = `<div class="text-center py-20 opacity-60"><p class="font-medium text-sm text-slate-500">${t('empty')}</p></div>`; updateCartSummary(); return; }

        const priceType = document.querySelector('input[name="price_type"]:checked').value;

        const grouped = window.cart.reduce((a, c) => { const f = a.find(x => x.id === c.id); if (f) { f.qty++; } else { a.push({ ...c, qty: 1 }); } return a; }, []);
        grouped.forEach(item => {
            const usePrice = priceType === 'wholesale' ? (item.wholesalePrice || item.retailPrice || item.price) : (item.retailPrice || item.price);
            list.innerHTML += `
            <div class="flex justify-between items-center bg-white border border-slate-100 mb-2 p-2 rounded-xl shadow-sm">
                <div class="flex gap-2 items-center"><div class="w-7 h-7 rounded border bg-slate-50 flex items-center justify-center text-xs font-bold text-slate-600">x${item.qty}</div>
                <div><div class="text-xs font-bold text-slate-800 line-clamp-1">${item.name} ${item.variant?`(${item.variant})`:''}</div><div class="text-[10px] text-slate-400">${usePrice.toLocaleString()} Ks</div></div></div>
                <div class="flex items-center gap-2"><div class="text-xs font-bold text-slate-800">${(usePrice * item.qty).toLocaleString()}</div><button onclick="removeFromCart('${item.id}')" class="text-red-400 p-1"><i class="ph ph-trash"></i></button></div>
            </div>`;
        });
        updateCartSummary();
    };
    window.removeFromCart = (id) => { window.cart = window.cart.filter(i => i.id !== id); renderCart(); };
    document.getElementById('discount').addEventListener('input', updateCartSummary); document.getElementById('tax').addEventListener('input', updateCartSummary);

    function updateCartSummary() {
        const priceType = document.querySelector('input[name="price_type"]:checked')?.value || 'retail';
        const subTotal = window.cart.reduce((sum, i) => {
            const p = priceType === 'wholesale' ? (i.wholesalePrice || i.retailPrice || i.price) : (i.retailPrice || i.price);
            return sum + (p * (i.qty || 1));
        }, 0);
        const disc = parseFloat(document.getElementById('discount')?.value) || 0; const tax = parseFloat(document.getElementById('tax')?.value) || 0;
        const total = (subTotal - (subTotal * disc / 100)) + ((subTotal - (subTotal * disc / 100)) * tax / 100);
        
        document.getElementById('cart-summary').innerHTML = `
            <div class="flex justify-between text-slate-500 text-xs"><span>${t('subtotal')}</span><span class="text-slate-700">${subTotal.toLocaleString()}</span></div>
            <div class="flex justify-between text-slate-500 text-xs"><span>${t('discount')} (${disc}%)</span><span class="text-red-500">-${(subTotal * disc / 100).toLocaleString()}</span></div>
            <div class="flex justify-between items-end mt-2 pt-2 border-t border-slate-100"><span class="text-sm font-bold text-slate-800">${t('total')}</span><span class="text-xl font-black text-brand-600">${total.toLocaleString()} Ks</span></div>`;
        const mTotal = document.getElementById('mobile-cart-total'); if(mTotal) mTotal.innerText = `${total.toLocaleString()} Ks`;
    }

    window.holdOrder = () => { if (window.cart.length === 0) return; heldOrders.push([...window.cart]); window.clearCart(); document.getElementById('held-count').innerText = heldOrders.length; document.getElementById('held-count').classList.remove('hidden'); alert(currentLang==='mm'?"ဆိုင်းငံ့ထားပါပြီ":"Held."); };
    window.viewHeldOrders = () => {
        if(heldOrders.length === 0) return alert("Empty");
        let html = `<div class="flex justify-between mb-4"><h2 class="text-lg font-bold">Held Orders</h2><button onclick="closeModal()"><i class="ph ph-x"></i></button></div><div class="space-y-2">`;
        heldOrders.forEach((order, idx) => {
            html += `<div class="bg-white p-3 rounded-lg border flex justify-between items-center"><div><b>Order #${idx+1}</b> <span class="text-xs">(${order.length} items)</span></div><div><button onclick="restoreOrder(${idx})" class="bg-blue-50 text-blue-600 px-3 py-1 rounded font-bold text-xs mr-2">Restore</button><button onclick="deleteHeldOrder(${idx})" class="text-red-500"><i class="ph ph-trash"></i></button></div></div>`;
        });
        openModal(html + '</div>');
    };
    window.restoreOrder = (idx) => { window.cart = [...heldOrders[idx]]; deleteHeldOrder(idx); closeModal(); renderCart(); };
    window.deleteHeldOrder = (idx) => { heldOrders.splice(idx, 1); document.getElementById('held-count').innerText = heldOrders.length; if(heldOrders.length===0) document.getElementById('held-count').classList.add('hidden'); if(!document.getElementById('modal').classList.contains('hidden')) viewHeldOrders(); };

    // CHECKOUT
    document.getElementById('chk-btn').onclick = async () => {
        if (window.cart.length === 0) return;
        const priceType = document.querySelector('input[name="price_type"]:checked').value;
        const subTotal = window.cart.reduce((sum, i) => { const p = priceType === 'wholesale' ? (i.wholesalePrice || i.retailPrice || i.price) : (i.retailPrice || i.price); return sum + (p * (i.qty || 1)); }, 0);
        const totalCost = window.cart.reduce((sum, i) => sum + ((i.costPrice || 0) * (i.qty || 1)), 0); 
        const disc = parseFloat(document.getElementById('discount').value) || 0; const tax = parseFloat(document.getElementById('tax').value) || 0;
        const total = (subTotal - (subTotal * disc / 100)) + ((subTotal - (subTotal * disc / 100)) * tax / 100);
        const paymentMethod = document.getElementById('payment-method').value; 
        
        // Handle Customer Type
        const custVal = document.getElementById('customer-select').value;
        const isGeneric = ['Walk-in', 'Phone Order', 'Online'].includes(custVal);
        const customerId = isGeneric ? null : custVal;
        const customerName = isGeneric ? custVal : document.getElementById('customer-select').options[document.getElementById('customer-select').selectedIndex].text.split(' (')[0];
        
        try {
            const batch = writeBatch(db); const saleRef = doc(collection(db, "shops", shop_id, "sales"));
            const itemsToSave = window.cart.map(i => ({ 
                name: i.name, 
                price: priceType === 'wholesale' ? (i.wholesalePrice || i.retailPrice || i.price) : (i.retailPrice || i.price), 
                cost: i.costPrice || 0,
                qty: i.qty || 1, productId: i.id 
            }));
            batch.set(saleRef, {
                items: itemsToSave, subTotal, totalCost, discount: disc, tax, total, profit: total - totalCost, paymentMethod, 
                customerType: custVal, customerId: customerId, customerName: customerName,
                createdAt: serverTimestamp(), userId: auth.currentUser?.uid || null
            });
            window.cart.forEach(item => { batch.update(doc(db, "shops", shop_id, "products", item.id), { quantity: increment(-(item.qty || 1)) }); });
            
            if(paymentMethod === 'Credit' && customerId) {
                batch.update(doc(db, "shops", shop_id, "customers", customerId), { debt: increment(total), points: increment(Math.floor(total / 100)) });
            } else if(customerId) {
                batch.update(doc(db, "shops", shop_id, "customers", customerId), { points: increment(Math.floor(total / 100)) });
            }
            await batch.commit();
            printReceipt({items: itemsToSave, total, paymentMethod, customer: customerName, date: new Date().toLocaleString()});
            window.clearCart(); document.getElementById('discount').value = 0; document.getElementById('tax').value = 0;
            if(!document.getElementById('cart-panel').classList.contains('translate-x-full')) toggleMobileCart();
        } catch(e) { alert('Checkout error: ' + e.message); }
    };

    function printReceipt(data) {
        let custLine = data.customer && data.customer !== 'Walk-in' ? `<p style="font-size:10px;margin:2px 0;font-weight:bold;">[${data.customer}]</p>` : '';
        let h = `<center><img src="${shop_settings.logo || ''}" style="max-height:50px; display:${shop_settings.logo?'inline':'none'}"><h2 style="margin:5px 0 0;font-weight:900;text-transform:uppercase;">${shop_name}</h2><p style="font-size:10px;margin:2px 0;">${shop_settings.address || ''}<br>${shop_settings.phone || ''}</p><p style="font-size:10px;color:#666;">${data.date}</p>${custLine}<hr style="border-top:1px dashed #000;margin:10px 0;"></center><table style="width:100%;font-size:12px;">`;
        const g = data.items.reduce((a, c) => { const f = a.find(x => x.name === c.name); if (f) { f.qty+=c.qty; f.tt += (c.price*c.qty); } else { a.push({ ...c, tt: c.price*c.qty }); } return a; }, []);
        g.forEach(i => h += `<tr><td style="padding:4px 0;">${i.name} x${i.qty}</td><td align="right">${i.tt.toLocaleString()}</td></tr>`);
        h += `</table><hr style="border-top:1px dashed #000;margin:10px 0;"><h3 align="right" style="margin:0;">TOTAL: ${data.total.toLocaleString()} Ks</h3><p align="right" style="font-size:10px;margin:2px 0;">(${data.paymentMethod})</p><center><p style="font-size:10px;margin-top:20px;">${shop_settings.footer || 'Thank you!'}</p></center>`;
        document.getElementById('r-p').innerHTML = h; window.print();
    }

    const observer = new MutationObserver(() => {
        if (!document.getElementById('pos-main').classList.contains('hidden')) {
            onSnapshot(collection(db, "shops", shop_id, "customers"), (snap) => {
                const sel = document.getElementById('customer-select'); if (!sel) return;
                sel.innerHTML = `<option value="Walk-in" data-i18n="walkin">Walk-in Customer</option><option value="Phone Order">Phone Order (ဖုန်းအော်ဒါ)</option><option value="Online">Online Customer (အွန်လိုင်း)</option>`;
                snap.forEach(d => { const c = d.data(); sel.innerHTML += `<option value="${d.id}">${c.name} (${c.debt ? c.debt+' Ks Credit' : c.points+' pts'})</option>`; });
            });
        }
    }); observer.observe(document.getElementById('pos-main'), { attributes: true, attributeFilter: ['class'] });

    const modal = document.getElementById('modal'); const modalContent = document.getElementById('modal-content');
    function openModal(html) { modalContent.innerHTML = html; modal.classList.remove('hidden'); }
    window.closeModal = () => modal.classList.add('hidden');
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    const linkButtons = (idDesk, idMob, func) => { if(document.getElementById(idDesk)) document.getElementById(idDesk).onclick = func; if(document.getElementById(idMob)) document.getElementById(idMob).onclick = () => { toggleMobileMenu(); func(); }; }

    // ---- ERP MODALS ----

    // 1. INVENTORY + EDIT / DELETE
    const showItemsModal = () => {
        openModal(`
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4"><h2 class="text-xl font-bold"><i class="ph ph-package"></i> ${t('inventory')}</h2><button onclick="closeModal()"><i class="ph ph-x"></i></button></div>
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-6">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                    <div class="col-span-2"><label class="text-xs font-bold text-slate-500 uppercase">Item Name *</label><input id="p-name" type="text" class="w-full p-2 border rounded-lg text-sm"></div>
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Category</label><input id="p-cat" type="text" list="cat-list" class="w-full p-2 border rounded-lg text-sm"><datalist id="cat-list">${Array.from(new Set(allProducts.map(p=>p.category).filter(Boolean))).map(c=>`<option value="${c}">`).join('')}</datalist></div>
                    <div><label class="text-xs font-bold text-slate-500 uppercase">SKU / Barcode</label><input id="p-sku" type="text" class="w-full p-2 border rounded-lg text-sm"></div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Cost Price (Ks)</label><input id="p-cost" type="number" class="w-full p-2 border rounded-lg text-sm"></div>
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Wholesale (Ks)</label><input id="p-whole" type="number" class="w-full p-2 border rounded-lg text-sm"></div>
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Retail Price (Ks)*</label><input id="p-retail" type="number" class="w-full p-2 border rounded-lg text-sm"></div>
                    <div><label class="text-xs font-bold text-slate-500 uppercase">Stock Qty *</label><input id="p-qty" type="number" class="w-full p-2 border rounded-lg text-sm"></div>
                </div>

        const tObj = new Date(); tObj.setHours(0,0,0,0); const today = tObj.getTime();
        
        const [salesS, expS, payS, purS] = await Promise.all([
            getDocs(query(collection(db, "shops", shop_id, "sales"))),
            getDocs(query(collection(db, "shops", shop_id, "expenses"))),
            getDocs(query(collection(db, "shops", shop_id, "payroll"))),
            getDocs(query(collection(db, "shops", shop_id, "purchases")))
        ]);

        let totalRev = 0, totalCOG = 0, totalExp = 0, totalPay = 0, totalPur = 0; let todayRev = 0;
        salesS.forEach(d => { const s=d.data(); totalRev+=s.total; totalCOG+=(s.totalCost||0); if(s.createdAt && s.createdAt.toMillis()>=today) todayRev+=s.total; });
        expS.forEach(d => { totalExp += d.data().amount; });
        payS.forEach(d => { totalPay += d.data().amount; });
        purS.forEach(d => { totalPur += d.data().amount; });

        const grossProfit = totalRev - totalCOG;
        const netProfit = grossProfit - totalExp - totalPay;
        
        let invCostVal = 0, invRetVal = 0;
        allProducts.forEach(p => { invCostVal += (p.costPrice||0)*p.quantity; invRetVal += (p.retailPrice||p.price||0)*p.quantity; });

        openModal(`
            <div class="flex justify-between items-center mb-4 border-b pb-4"><h2 class="text-xl font-bold flex items-center gap-2"><i class="ph ph-chart-bar text-slate-500"></i> Master P&L Reports</h2><button onclick="closeModal()" class="bg-slate-50 p-2 rounded-lg"><i class="ph ph-x"></i></button></div>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-white border p-4 rounded-xl shadow-sm"><div class="text-[10px] font-bold text-slate-400 uppercase">Today Revenue</div><div class="text-xl font-black text-brand-600">${todayRev.toLocaleString()} Ks</div></div>
                <div class="bg-white border p-4 rounded-xl shadow-sm"><div class="text-[10px] font-bold text-slate-400 uppercase">All-Time Revenue</div><div class="text-xl font-black text-brand-600">${totalRev.toLocaleString()} Ks</div></div>
            </div>

            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 border-b pb-1">Profit & Loss (P&L)</h3>
            <div class="bg-white rounded-xl border p-4 text-sm mb-4 space-y-2 shadow-sm">
                <div class="flex justify-between"><span class="text-slate-600 font-medium">Total Revenue (Sales)</span><b class="text-slate-800">${totalRev.toLocaleString()}</b></div>
                <div class="flex justify-between text-slate-500"><span class="font-medium">- Cost of Goods Sold</span><span>-${totalCOG.toLocaleString()}</span></div>
                <div class="flex justify-between border-t border-b py-2 my-1"><span class="font-medium"><b>Gross Profit</b> (အကြမ်းအမြတ်)</span><b class="text-blue-600 text-base">${grossProfit.toLocaleString()}</b></div>
                <div class="flex justify-between text-red-500"><span class="font-medium">- Total Expenses</span><span>-${totalExp.toLocaleString()}</span></div>
                <div class="flex justify-between text-red-500"><span class="font-medium">- Payroll</span><span>-${totalPay.toLocaleString()}</span></div>
                <div class="flex justify-between border-t pt-2 mt-1"><span class="text-base font-medium"><b>Net Profit</b> (အသားတင်အမြတ်)</span><b class="text-lg ${netProfit<0?'text-red-600':'text-emerald-600'}">${netProfit.toLocaleString()} Ks</b></div>
            </div>

            <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 border-b pb-1">Inventory Valuation</h3>
            <div class="bg-white rounded-xl border p-4 text-sm mb-4 shadow-sm flex justify-between">
                <div><span class="text-slate-500 text-xs block font-medium">Cost Value (အရင်း)</span><b class="text-slate-800 text-base">${invCostVal.toLocaleString()} Ks</b></div>
                <div class="text-right"><span class="text-slate-500 text-xs block font-medium">Retail Value (ရောင်းစျေး)</span><b class="text-slate-800 text-base">${invRetVal.toLocaleString()} Ks</b></div>
            </div>
            
            <div class="bg-slate-100 p-3 rounded-lg text-xs font-bold text-center text-slate-500">Total Purchases to Suppliers: ${totalPur.toLocaleString()} Ks</div>
        `);
    }; linkButtons('btn-reports', 'btn-reports-m', showReportsModal);

    // 8. SHIFT
    const showShiftModal = () => {
        openModal(`
            <div class="flex justify-between items-center mb-6 border-b pb-4"><h2 class="text-xl font-bold flex items-center gap-2"><i class="ph ph-clock text-slate-500"></i> ${t('shifts')}</h2><button onclick="closeModal()" class="bg-slate-50 p-2 rounded-lg"><i class="ph ph-x"></i></button></div>
            <div class="flex gap-4 mb-4"><button id="clock-in" class="flex-1 bg-white border shadow-sm hover:border-brand-500 py-3 rounded-xl font-bold text-sm">Clock In</button><button id="clock-out" class="flex-1 bg-white border shadow-sm hover:border-red-500 py-3 rounded-xl font-bold text-sm">Clock Out</button></div>
            <div id="shift-log" class="space-y-2 max-h-[40vh] overflow-y-auto pr-2"></div>
        `);
        document.getElementById('clock-in').onclick = () => { if(auth.currentUser) addDoc(collection(db, "shops", shop_id, "shifts"), { userId: auth.currentUser.uid, type: 'in', time: serverTimestamp() }); };
        document.getElementById('clock-out').onclick = () => { if(auth.currentUser) addDoc(collection(db, "shops", shop_id, "shifts"), { userId: auth.currentUser.uid, type: 'out', time: serverTimestamp() }); };
        onSnapshot(query(collection(db, "shops", shop_id, "shifts"), where("userId", "==", auth.currentUser.uid), orderBy("time", "desc")), (snap) => {
            const log = document.getElementById('shift-log'); if (!log) return; log.innerHTML = '';
            snap.forEach(d => { const s = d.data(); log.innerHTML += `<div class="bg-white p-3 rounded-xl border flex justify-between text-sm font-bold shadow-sm"><div>${s.type==='in'?'In':'Out'}</div><div class="text-slate-400 text-xs">${s.time?.toDate().toLocaleString()}</div></div>`; });
        });
    }; linkButtons('btn-shift', 'btn-shift-m', showShiftModal);

    // 9. SETTINGS
    const showSettingsModal = () => {
        openModal(`
            <div class="flex justify-between items-center mb-6 border-b pb-4"><h2 class="text-xl font-bold flex items-center gap-2"><i class="ph ph-gear text-slate-500"></i> ${t('settings')}</h2><button onclick="closeModal()" class="bg-slate-50 p-2 rounded-lg"><i class="ph ph-x"></i></button></div>
            <div class="space-y-3 bg-slate-50 p-4 rounded-2xl border">
                <div><label class="block text-xs font-bold text-slate-500 mb-1">Store Name</label><input id="set-name" type="text" value="${shop_settings.shopName || shop_name}" class="w-full p-3 border rounded-xl text-sm font-bold"></div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1">Phone Number</label><input id="set-phone" type="text" value="${shop_settings.phone || ''}" class="w-full p-3 border rounded-xl text-sm"></div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1">Address</label><input id="set-add" type="text" value="${shop_settings.address || ''}" class="w-full p-3 border rounded-xl text-sm"></div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1">Receipt Footer Note</label><input id="set-foot" type="text" value="${shop_settings.footer || 'Thank you!'}" class="w-full p-3 border rounded-xl text-sm"></div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1">Logo URL (Optional)</label><input id="set-logo" type="text" value="${shop_settings.logo || ''}" placeholder="https://..." class="w-full p-3 border rounded-xl text-sm"></div>
                <div class="pt-2"><button id="save-set-btn" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-sm">Save Settings</button></div>
            </div>
        `);
        document.getElementById('save-set-btn').onclick = async () => {
            const n = document.getElementById('set-name').value.trim(), f = document.getElementById('set-foot').value.trim(), p = document.getElementById('set-phone').value.trim(), a = document.getElementById('set-add').value.trim(), l = document.getElementById('set-logo').value.trim();
            try {
                await setDoc(doc(db, "shops", shop_id, "settings", "general"), { shopName: n, footer: f, phone: p, address: a, logo: l }, { merge: true });
                shop_settings = { shopName: n, footer: f, phone: p, address: a, logo: l }; shop_name = n; updateText('s-name', n);
                alert("Saved!"); closeModal();
            } catch(e) { alert(e.message); }
        };
    }; linkButtons('btn-settings', 'btn-settings-m', showSettingsModal);

</script>
</body>
</html>
