<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swift POS - Responsive Ant Design Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        antBg: '#f0f2f5',
                        antPrimary: '#1890ff',
                        antPrimaryHover: '#40a9ff',
                        antText: '#000000d9',
                        antTextSecondary: '#00000073',
                        antBorder: '#f0f0f0'
                    },
                    boxShadow: {
                        antCard: '0 1px 2px -2px rgba(0, 0, 0, 0.16), 0 3px 6px 0 rgba(0, 0, 0, 0.12), 0 5px 12px 4px rgba(0, 0, 0, 0.09)'
                    },
                    screens: {
                        'xs': '400px',
                    }
                }
            }
        }
    </script>
    <style>
        @media print { body * { visibility: hidden; } #r-p, #r-p * { visibility: visible; } #r-p { position: absolute; left: 0; top: 0; width: 58mm; font-size: 12px; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; touch-action: manipulation; }
    </style>
</head>
<body class="bg-antBg h-[100dvh] flex flex-col text-antText overflow-hidden w-full">

<div id="pos-login" class="flex items-center justify-center h-[100dvh] bg-antBg z-50 absolute inset-0 p-4">
    <div class="bg-white p-6 sm:p-10 rounded-2xl shadow-antCard w-full max-w-md border border-antBorder text-center relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1.5 bg-antPrimary"></div>
        <div class="flex justify-center mb-2"><i class="ph ph-storefront text-5xl text-antPrimary"></i></div>
        <h2 class="text-2xl sm:text-3xl font-black mb-1 text-slate-800 tracking-tight">SWIFT POS</h2>
        <p class="text-antTextSecondary mb-6 sm:mb-8 text-xs sm:text-sm font-medium uppercase tracking-widest">Digital Terminal</p>
        
        <div class="space-y-3 sm:space-y-4">
            <input id="u" type="text" placeholder="Username" class="w-full px-4 sm:px-5 py-3 border border-antBorder rounded-lg outline-none focus:border-antPrimary focus:ring-1 focus:ring-antPrimary transition text-sm sm:text-base">
            <input id="p" type="password" placeholder="Password" class="w-full px-4 sm:px-5 py-3 border border-antBorder rounded-lg outline-none focus:border-antPrimary focus:ring-1 focus:ring-antPrimary transition text-sm sm:text-base">
            <button id="l-btn" class="w-full bg-antPrimary text-white font-bold py-3 sm:py-3.5 rounded-lg shadow-sm hover:bg-antPrimaryHover active:scale-[0.98] transition-all text-base sm:text-lg mt-2">LOGIN</button>
            <p id="l-err" class="text-red-500 text-xs mt-4 hidden bg-red-50 p-3 rounded-lg border border-red-100"></p>
        </div>
        <p class="text-[10px] sm:text-xs text-antTextSecondary mt-4 sm:mt-6">Demo: master / master123</p>
    </div>
</div>

<div id="pos-main" class="hidden flex flex-col h-[100dvh] w-full overflow-hidden">
    
    <header class="bg-white border-b border-antBorder flex flex-col md:flex-row items-center justify-between p-2 sm:px-4 lg:px-6 shadow-sm z-20 shrink-0 gap-2">
        <div class="flex items-center justify-between w-full md:w-auto gap-2 lg:gap-6">
            <h1 class="text-lg lg:text-xl font-bold text-antPrimary flex items-center gap-1.5 shrink-0">
                <i class="ph ph-storefront text-xl lg:text-2xl"></i>
                <span id="s-name" class="uppercase hidden xs:inline text-sm lg:text-base truncate max-w-[120px] lg:max-w-full">SWIFT POS</span>
            </h1>
            
            <div class="bg-antBg px-2 lg:px-4 py-1.5 rounded-md flex items-center gap-1.5 w-full md:w-64 lg:w-80 border border-antBorder focus-within:border-antPrimary focus-within:ring-1 focus-within:ring-antPrimary transition-all">
                <i class="ph ph-barcode text-antTextSecondary text-base lg:text-lg shrink-0"></i>
                <input id="barcode-input" type="text" placeholder="Search SKU..." class="bg-transparent border-none outline-none w-full text-xs lg:text-sm">
                <button id="clear-barcode" class="text-antTextSecondary hover:text-red-500 shrink-0"><i class="ph ph-x-circle"></i></button>
            </div>
        </div>

        <div class="flex items-center w-full md:w-auto justify-between md:justify-end gap-1 sm:gap-2 text-xs lg:text-sm font-medium overflow-x-auto no-scrollbar pb-1 md:pb-0">
            <div class="flex items-center gap-1 sm:gap-2 shrink-0">
                <button id="btn-items" class="flex items-center gap-1 px-2 py-1.5 rounded-md hover:bg-antBg text-antTextSecondary hover:text-antPrimary transition"><i class="ph ph-package text-lg"></i> <span class="hidden lg:inline">Items</span></button>
                <button id="btn-reports" class="flex items-center gap-1 px-2 py-1.5 rounded-md hover:bg-antBg text-antTextSecondary hover:text-antPrimary transition"><i class="ph ph-chart-line-up text-lg"></i> <span class="hidden lg:inline">Reports</span></button>
                <button id="btn-customers" class="flex items-center gap-1 px-2 py-1.5 rounded-md hover:bg-antBg text-antTextSecondary hover:text-antPrimary transition"><i class="ph ph-users text-lg"></i> <span class="hidden lg:inline">Customers</span></button>
                <button id="btn-shift" class="flex items-center gap-1 px-2 py-1.5 rounded-md hover:bg-antBg text-antTextSecondary hover:text-antPrimary transition"><i class="ph ph-clock text-lg"></i> <span class="hidden lg:inline">Shift</span></button>
            </div>
            <div class="flex items-center gap-1 sm:gap-2 shrink-0">
                <div class="h-5 w-[1px] bg-antBorder mx-1"></div>
                <span id="e-date" class="text-[9px] lg:text-[10px] bg-blue-50 text-antPrimary px-1.5 py-1 rounded border border-blue-100 hidden">EXP:...</span>
                <button id="lo-btn" class="flex items-center gap-1 text-red-500 hover:bg-red-50 px-2 py-1.5 rounded-md transition ml-1">
                    <i class="ph ph-sign-out text-lg"></i> <span class="hidden lg:inline">Logout</span>
                </button>
            </div>
        </div>
    </header>

    <div class="flex flex-col lg:flex-row flex-1 overflow-hidden p-2 sm:p-3 lg:p-4 gap-2 sm:gap-3 lg:gap-4">
        
        <aside id="category-sidebar" class="w-full lg:w-24 flex flex-row lg:flex-col gap-2 overflow-x-auto lg:overflow-y-auto no-scrollbar shrink-0 pb-1 lg:pb-0">
            </aside>

        <main class="flex-1 overflow-y-auto no-scrollbar bg-white p-2 lg:p-4 rounded-lg border border-antBorder shadow-sm relative">
            <div id="p-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-2 lg:gap-4 pb-4 lg:pb-10">
                </div>
        </main>

        <aside class="w-full lg:w-96 h-[45dvh] lg:h-full bg-white rounded-lg border border-antBorder shadow-sm flex flex-col shrink-0 overflow-hidden relative">
            
            <div class="bg-antBg p-2 flex justify-between items-center border-b border-antBorder shrink-0">
                <span class="text-xs lg:text-sm font-bold pl-1 lg:pl-2 text-antTextSecondary uppercase tracking-widest">Order Cart</span>
                <button onclick="clearCart()" class="text-[10px] lg:text-xs text-red-500 hover:bg-red-50 px-2 py-1 rounded transition">Reset</button>
            </div>

            <div class="p-2 lg:p-3 border-b border-antBorder bg-white shrink-0">
                <div class="flex items-center gap-2 bg-antBg p-1.5 lg:p-2 rounded-md border border-antBorder">
                    <i class="ph ph-user text-antTextSecondary text-base lg:text-lg"></i>
                    <select id="customer-select" class="w-full bg-transparent border-none outline-none text-xs lg:text-sm font-medium text-antText cursor-pointer">
                        <option value="">Walk-in Customer</option>
                    </select>
                </div>
            </div>

            <div id="c-list" class="flex-1 overflow-y-auto p-2 lg:p-4 space-y-2 lg:space-y-3">
                <div class="text-center py-10 lg:py-20 opacity-30 flex flex-col items-center">
                    <i class="ph ph-shopping-cart text-4xl lg:text-5xl mb-2"></i>
                    <p class="font-medium text-xs lg:text-sm">Cart is empty</p>
                </div>
            </div>

            <div class="p-2 lg:p-4 bg-antBg border-t border-antBorder shrink-0">
                <div class="flex gap-2 mb-2 lg:mb-3">
                    <div class="flex-1 bg-white border border-antBorder rounded p-1 lg:p-1.5 flex items-center justify-between">
                        <span class="text-[9px] lg:text-[10px] text-antTextSecondary ml-1">Disc%</span>
                        <input id="discount" type="number" value="0" class="w-10 lg:w-12 text-right border-none outline-none text-xs lg:text-sm font-bold bg-transparent">
                    </div>
                    <div class="flex-1 bg-white border border-antBorder rounded p-1 lg:p-1.5 flex items-center justify-between">
                        <span class="text-[9px] lg:text-[10px] text-antTextSecondary ml-1">Tax%</span>
                        <input id="tax" type="number" value="0" class="w-10 lg:w-12 text-right border-none outline-none text-xs lg:text-sm font-bold bg-transparent">
                    </div>
                </div>

                <div class="mb-2 lg:mb-3 bg-white border border-antBorder rounded p-1 lg:p-1.5 flex items-center">
                    <i class="ph ph-wallet text-antTextSecondary ml-1 mr-1 lg:mr-2 text-base lg:text-lg"></i>
                    <select id="payment-method" class="w-full bg-transparent border-none outline-none text-xs lg:text-sm font-medium">
                        <option value="Cash">Cash</option><option value="Card">Card</option><option value="KPay">KPay</option><option value="WavePay">WavePay</option>
                    </select>
                </div>

                <div id="cart-summary" class="space-y-1 lg:space-y-1.5 mb-2 lg:mb-4 text-xs lg:text-sm font-medium border-t border-antBorder pt-2 lg:pt-3">
                    <div class="flex justify-between text-antTextSecondary"><span>Subtotal</span><span>0.00</span></div>
                    <div class="flex justify-between text-antTextSecondary"><span>Discount</span><span>0.00</span></div>
                    <div class="flex justify-between items-end mt-1 lg:mt-2">
                        <span class="text-sm lg:text-lg font-bold text-antText">Total</span>
                        <span class="text-lg lg:text-2xl font-black text-antPrimary">0.00 Ks</span>
                    </div>
                </div>

                <button id="chk-btn" class="w-full bg-antPrimary hover:bg-antPrimaryHover text-white font-bold py-2 lg:py-3.5 rounded-lg shadow-sm lg:shadow-[0_4px_10px_rgba(24,144,255,0.3)] transition-all flex items-center justify-center gap-2 text-sm lg:text-lg">
                    <i class="ph ph-receipt text-lg lg:text-xl"></i> PAY & PRINT
                </button>
            </div>
        </aside>

    </div>
</div>

<div id="r-p" class="hidden"></div>

<div id="modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50 backdrop-blur-sm transition-opacity p-4">
    <div id="modal-content" class="bg-white p-4 sm:p-6 rounded-xl shadow-2xl w-full max-w-2xl max-h-[90dvh] overflow-y-auto border border-antBorder"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, getDocs, collection, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, where, limit, serverTimestamp, increment, writeBatch, enableMultiTabIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC53tnpw-3Uupzc1Me8ZGEDzy903yG-S0Y",
        authDomain: "ascedia-60dd4.firebaseapp.com",
        databaseURL: "https://ascedia-60dd4-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ascedia-60dd4",
        storageBucket: "ascedia-60dd4.firebasestorage.app",
        messagingSenderId: "77398379374",
        appId: "1:77398379374:web:5f1c72cd77f950a24dcf7f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    enableMultiTabIndexedDbPersistence(db).catch(err => console.warn('Offline Mode Unavailable:', err));

    let shop_id = null; let shop_name = ""; let userRole = 'staff';
    window.cart = [];
    let allProducts = [];
    let currentCategory = 'All';

    const updateText = (id, txt) => { const el = document.getElementById(id); if (el) el.innerText = txt; };

    // ---- AUTH ----
    document.getElementById('l-btn').onclick = async () => {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value;
        const err = document.getElementById('l-err');
        if (err) err.classList.add('hidden');

        if (u === 'master' && p === 'master123') {
            shop_id = 'master_shop'; shop_name = 'SWIFT TEST STORE'; userRole = 'owner';
            updateText('s-name', shop_name);
            document.getElementById('pos-login').style.display = 'none';
            document.getElementById('pos-main').classList.remove('hidden');
            loadProducts(); return;
        }

        try {
            document.getElementById('l-btn').innerText = "Connecting...";
            const cred = await signInWithEmailAndPassword(auth, `${u}@pos.local`, p);
            const userDoc = await getDoc(doc(db, "users", cred.user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                if (new Date() > new Date(data.expiryDate)) {
                    signOut(auth);
                    throw new Error("Subscription Expired! Contact Admin.");
                }
                shop_id = data.shopId; shop_name = data.shopName; userRole = data.role || 'staff';
                updateText('s-name', shop_name);
                document.getElementById('e-date').classList.remove('hidden');
                updateText('e-date', "EXP: " + new Date(data.expiryDate).toLocaleDateString());
                
                document.getElementById('pos-login').style.display = 'none';
                document.getElementById('pos-main').classList.remove('hidden');
                loadProducts();
            }
        } catch (e) { if (err) { err.innerText = e.message; err.classList.remove('hidden'); } }
        document.getElementById('l-btn').innerText = "LOGIN";
    };

    document.getElementById('lo-btn').onclick = () => { signOut(auth); location.reload(); };

    // ---- LOAD PRODUCTS & CATEGORIES ----
    function loadProducts() {
        if (!shop_id) return;
        onSnapshot(query(collection(db, "shops", shop_id, "products"), orderBy("name")), (snap) => {
            allProducts = [];
            const categories = new Set();
            
            snap.forEach(d => {
                const p = { id: d.id, ...d.data() };
                allProducts.push(p);
                if (p.category && p.category.trim() !== '') {
                    categories.add(p.category.trim());
                }
            });
            
            renderCategorySidebar(['All', ...Array.from(categories)]);
            renderProductGrid();
        });
    }

    function renderCategorySidebar(categories) {
        const sidebar = document.getElementById('category-sidebar');
        if (!sidebar) return;
        sidebar.innerHTML = '';
        
        categories.forEach(cat => {
            const isActive = cat === currentCategory;
            const activeClass = isActive 
                ? 'bg-antPrimary text-white shadow-sm' 
                : 'bg-white text-antTextSecondary border border-transparent hover:border-antBorder hover:text-antPrimary hover:shadow-sm';
            const icon = cat === 'All' ? 'ph-squares-four' : 'ph-tag';
            
            sidebar.innerHTML += `
            <button onclick="setCategory('${cat}')" class="${activeClass} p-1 sm:p-2 lg:p-3 rounded-lg flex flex-col items-center justify-center gap-1 h-14 w-20 lg:h-20 lg:w-full transition-all shrink-0">
                <i class="ph ${icon} text-lg lg:text-2xl"></i>
                <span class="text-[9px] lg:text-[10px] font-medium uppercase tracking-wider text-center leading-tight line-clamp-1 lg:line-clamp-2">${cat}</span>
            </button>`;
        });
    }

    window.setCategory = (cat) => {
        currentCategory = cat;
        const categories = new Set(allProducts.map(p => p.category).filter(c => c && c.trim() !== ''));
        renderCategorySidebar(['All', ...Array.from(categories)]);
        renderProductGrid();
    };

    function renderProductGrid() {
        const grid = document.getElementById('p-grid');
        if (!grid) return;
        grid.innerHTML = '';
        
        const filteredProducts = currentCategory === 'All' 
            ? allProducts 
            : allProducts.filter(p => p.category === currentCategory);
            
        if (filteredProducts.length === 0) {
            grid.innerHTML = `
            <div class="col-span-full flex flex-col items-center justify-center text-center py-20 opacity-50">
                <i class="ph ph-package text-6xl mb-4 text-antTextSecondary"></i>
                <p class="text-antTextSecondary font-medium text-sm">No items found.</p>
                <p class="text-antTextSecondary text-xs mt-2">Click <b>'Items'</b> menu above to add products and categories.</p>
            </div>`;
            return;
        }

        filteredProducts.forEach(p => {
            const isLow = p.quantity <= (p.lowStockThreshold || 5);
            const stockClass = isLow ? 'text-red-500 bg-red-50 border-red-100' : 'text-green-500 bg-green-50 border-green-100';
            
            grid.innerHTML += `
            <div class="bg-white rounded-lg border border-antBorder overflow-hidden hover:shadow-antCard cursor-pointer transition-all flex flex-col group" onclick="addToCart('${p.id}')">
                <div class="h-20 lg:h-24 bg-antBg flex items-center justify-center text-2xl lg:text-4xl group-hover:scale-105 transition-transform duration-300 relative">
                    <i class="ph ph-package text-antTextSecondary text-2xl lg:text-3xl"></i>
                    ${p.category ? `<span class="absolute top-1 lg:top-2 right-1 lg:right-2 bg-white/80 text-[8px] lg:text-[9px] px-1 lg:px-1.5 rounded text-antTextSecondary shadow-sm truncate max-w-[60px]">${p.category}</span>` : ''}
                </div>
                <div class="p-2 lg:p-3 flex flex-col flex-1 justify-between">
                    <div class="text-xs lg:text-sm font-medium leading-tight mb-1 lg:mb-2 text-antText line-clamp-2">${p.name}</div>
                    <div class="flex flex-col gap-1 mt-1">
                        <div class="text-antPrimary font-bold text-sm lg:text-base">${p.price.toLocaleString()} Ks</div>
                        <div class="text-[8px] lg:text-[10px] px-1 lg:px-1.5 py-0.5 rounded border font-medium ${stockClass} w-fit">
                            ${p.quantity} In Stock
                        </div>
                    </div>
                </div>
            </div>`;
        });
    }

    // ---- ADD TO CART & BARCODE ----
    window.addToCart = async (productId) => {
        const product = allProducts.find(p => p.id === productId);
        if (!product) return;
        const existing = window.cart.find(item => item.id === product.id);
        if (existing) {
            if (existing.qty < product.quantity) existing.qty++;
            else return alert('Out of stock!');
        } else {
            if (product.quantity > 0) window.cart.push({ ...product, qty: 1 });
            else return alert('Out of stock!');
        }
        renderCart();
    };

    document.getElementById('barcode-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const code = e.target.value.trim().toLowerCase();
            if (code) {
                const product = allProducts.find(p => p.sku && p.sku.toLowerCase() === code);
                if (product) addToCart(product.id);
                else alert('Not found: ' + code);
            }
            e.target.value = '';
        }
    });
    document.getElementById('clear-barcode').onclick = () => { 
        document.getElementById('barcode-input').value = ''; 
    };

    // ---- CART & CHECKOUT ----
    window.clearCart = () => { window.cart = []; renderCart(); };

    function renderCart() {
        const list = document.getElementById('c-list');
        if (!list) return;
        list.innerHTML = '';
        
        if (window.cart.length === 0) {
            list.innerHTML = `<div class="text-center py-10 lg:py-20 opacity-30 flex flex-col items-center">
                <i class="ph ph-shopping-cart text-4xl lg:text-5xl mb-2"></i>
                <p class="font-medium text-xs lg:text-sm">Cart is empty</p>
            </div>`;
            updateCartSummary(); return;
        }

        const grouped = window.cart.reduce((a, c) => {
            const found = a.find(x => x.id === c.id);
            if (found) { found.qty++; } else { a.push({ ...c, qty: 1 }); }
            return a;
        }, []);

        grouped.forEach(item => {
            list.innerHTML += `
            <div class="flex justify-between items-start group border-b border-antBorder pb-2 last:border-0 hover:bg-antBg p-1 -mx-1 rounded transition">
                <div class="flex gap-2 lg:gap-3 items-center">
                    <div class="w-5 h-5 lg:w-6 lg:h-6 rounded border border-antBorder flex items-center justify-center text-[10px] lg:text-xs font-bold text-antPrimary bg-blue-50 shrink-0">
                        ${item.qty}
                    </div>
                    <div>
                        <div class="text-xs lg:text-sm font-medium text-antText leading-tight line-clamp-1">${item.name}</div>
                        <div class="text-[10px] lg:text-xs text-antTextSecondary mt-0.5">${item.price.toLocaleString()} Ks/ea</div>
                    </div>
                </div>
                <div class="flex items-center gap-2 lg:gap-3 shrink-0">
                    <div class="text-xs lg:text-sm font-bold text-antText">${(item.price * item.qty).toLocaleString()}</div>
                    <button onclick="removeFromCart('${item.id}')" class="text-red-400 hover:text-red-600 transition"><i class="ph ph-trash text-sm lg:text-base"></i></button>
                </div>
            </div>`;
        });
        updateCartSummary();
    }
    
    window.removeFromCart = (id) => { window.cart = window.cart.filter(i => i.id !== id); renderCart(); };

    document.getElementById('discount').addEventListener('input', updateCartSummary);
    document.getElementById('tax').addEventListener('input', updateCartSummary);

    function updateCartSummary() {
        const subTotal = window.cart.reduce((sum, i) => sum + (i.price * (i.qty || 1)), 0);
        const disc = parseFloat(document.getElementById('discount')?.value) || 0;
        const tax = parseFloat(document.getElementById('tax')?.value) || 0;
        
        const total = (subTotal - (subTotal * disc / 100)) + ((subTotal - (subTotal * disc / 100)) * tax / 100);
        
        document.getElementById('cart-summary').innerHTML = `
            <div class="flex justify-between text-antTextSecondary"><span>Subtotal</span><span>${subTotal.toLocaleString()}</span></div>
            <div class="flex justify-between text-antTextSecondary"><span>Discount (${disc}%)</span><span>-${(subTotal * disc / 100).toLocaleString()}</span></div>
            <div class="flex justify-between items-end mt-1 lg:mt-2">
                <span class="text-sm lg:text-lg font-bold text-antText">Total</span>
                <span class="text-lg lg:text-2xl font-black text-antPrimary">${total.toLocaleString()} Ks</span>
            </div>`;
    }

    document.getElementById('chk-btn').onclick = async () => {
        if (window.cart.length === 0) return;
        
        const subTotal = window.cart.reduce((s, i) => s + (i.price * (i.qty || 1)), 0);
        const disc = parseFloat(document.getElementById('discount').value) || 0;
        const tax = parseFloat(document.getElementById('tax').value) || 0;
        const total = (subTotal - (subTotal * disc / 100)) + ((subTotal - (subTotal * disc / 100)) * tax / 100);
        const paymentMethod = document.getElementById('payment-method').value;
        const customerId = document.getElementById('customer-select').value;
        
        try {
            const batch = writeBatch(db);
            const saleRef = doc(collection(db, "shops", shop_id, "sales"));
            
            batch.set(saleRef, {
                items: window.cart.map(i => ({ name: i.name, price: i.price, qty: i.qty || 1, productId: i.id, sku: i.sku })),
                subTotal, discount: disc, tax, total,
                paymentMethod, customerId: customerId || null,
                createdAt: serverTimestamp(),
                userId: auth.currentUser?.uid || null
            });
            
            window.cart.forEach(item => {
                batch.update(doc(db, "shops", shop_id, "products", item.id), { quantity: increment(-(item.qty || 1)) });
            });
            
            if (customerId) {
                batch.update(doc(db, "shops", shop_id, "customers", customerId), { points: increment(Math.floor(total / 100)) });
            }
            await batch.commit();
            
            // Print receipt
            let h = `<center><h2 style="margin:0;font-weight:900;text-transform:uppercase;">${shop_name}</h2><p style="font-size:10px;color:#666;">VOUCHER - ${new Date().toLocaleString()}</p><hr style="border-top:1px dashed #000;margin:10px 0;"></center><table style="width:100%;font-size:12px;">`;
            const g = window.cart.reduce((a, c) => { const f = a.find(x => x.id === c.id); if (f) { f.qty++; f.tt += c.price; } else { a.push({ ...c, qty: 1, tt: c.price }); } return a; }, []);
            g.forEach(i => h += `<tr><td style="padding:4px 0;">${i.name} x${i.qty}</td><td align="right">${i.tt.toLocaleString()}</td></tr>`);
            h += `</table><hr style="border-top:1px dashed #000;margin:10px 0;"><h3 align="right" style="margin:0;">TOTAL: ${total.toLocaleString()} Ks</h3><p align="right" style="font-size:10px;margin:2px 0;">(${paymentMethod})</p><center><p style="font-size:10px;margin-top:20px;">THANK YOU!</p></center>`;
            document.getElementById('r-p').innerHTML = h; window.print();
            
            window.clearCart();
            document.getElementById('discount').value = 0; document.getElementById('tax').value = 0;
        } catch(e) { alert('Checkout error: ' + e.message); }
    };

    // ---- LOAD CUSTOMERS DROPDOWN ----
    const observer = new MutationObserver(() => {
        if (!document.getElementById('pos-main').classList.contains('hidden')) {
            onSnapshot(collection(db, "shops", shop_id, "customers"), (snap) => {
                const sel = document.getElementById('customer-select');
                if (!sel) return;
                sel.innerHTML = '<option value="">Walk-in Customer</option>';
                snap.forEach(d => { const c = d.data(); sel.innerHTML += `<option value="${d.id}">${c.name} (${c.points || 0} pts)</option>`; });
            });
        }
    });
    observer.observe(document.getElementById('pos-main'), { attributes: true, attributeFilter: ['class'] });

    // ---- MODALS & DIALOGS ----
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modal-content');

    function openModal(html) {
        modalContent.innerHTML = html;
        modal.classList.remove('hidden');
    }
    window.closeModal = () => modal.classList.add('hidden');
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    // ---- ITEMS MODAL (ADD CATEGORY FEATURE INCLUDED HERE) ----
    document.getElementById('btn-items').onclick = () => window.renderInventoryModal();

    window.renderInventoryModal = () => {
        openModal(`
            <div class="flex justify-between items-center mb-4 sm:mb-6 border-b border-antBorder pb-3 sm:pb-4">
                <h2 class="text-lg sm:text-xl font-bold flex items-center gap-2"><i class="ph ph-package text-antPrimary"></i> Manage Items</h2>
                <button onclick="closeModal()" class="text-antTextSecondary hover:text-red-500"><i class="ph ph-x text-xl"></i></button>
            </div>
            
            <div class="space-y-3 sm:space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                    <div><label class="block text-xs sm:text-sm font-medium text-antTextSecondary mb-1">Item Name *</label><input id="new-p-name" type="text" class="w-full px-3 py-2 border border-antBorder rounded-lg outline-none focus:border-antPrimary transition text-sm" placeholder="e.g. Iced Latte"></div>
                    <div>
                        <label class="block text-xs sm:text-sm font-medium text-antTextSecondary mb-1">Category / အမျိုးအစား *</label>
                        <input id="new-p-cat" type="text" list="cat-list" class="w-full px-3 py-2 border border-antBorder rounded-lg outline-none focus:border-antPrimary transition text-sm" placeholder="e.g. Drinks, Food">
                        <datalist id="cat-list">${Array.from(new Set(allProducts.map(p => p.category).filter(Boolean))).map(c => `<option value="${c}">`).join('')}</datalist>
                    </div>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 sm:gap-4">
                    <div><label class="block text-xs sm:text-sm font-medium text-antTextSecondary mb-1">Price (Ks) *</label><input id="new-p-price" type="number" class="w-full px-3 py-2 border border-antBorder rounded-lg outline-none focus:border-antPrimary transition text-sm" placeholder="0"></div>
                    <div><label class="block text-xs sm:text-sm font-medium text-antTextSecondary mb-1">Stock Qty *</label><input id="new-p-qty" type="number" class="w-full px-3 py-2 border border-antBorder rounded-lg outline-none focus:border-antPrimary transition text-sm" placeholder="0"></div>
                    <div><label class="block text-xs sm:text-sm font-medium text-antTextSecondary mb-1">SKU (Optional)</label><input id="new-p-sku" type="text" class="w-full px-3 py-2 border border-antBorder rounded-lg outline-none focus:border-antPrimary transition text-sm" placeholder="Barcode"></div>
                </div>
                
                <div class="flex justify-end pt-3 sm:pt-4 border-t border-antBorder mt-4 sm:mt-6">
                    <button id="save-item-btn" class="w-full sm:w-auto bg-antPrimary text-white px-6 py-2.5 rounded-lg font-bold hover:bg-antPrimaryHover shadow-sm transition flex items-center justify-center gap-2 text-sm sm:text-base">
                        <i class="ph ph-plus-circle text-lg"></i> Add Item
                    </button>
                </div>
            </div>
            
            <h3 class="text-xs sm:text-sm font-bold text-antTextSecondary uppercase tracking-widest mt-6 mb-3 border-t border-antBorder pt-4">Inventory (${allProducts.length})</h3>
            <div id="inv-list" class="space-y-2 max-h-[30vh] overflow-y-auto no-scrollbar pr-1"></div>
        `);

        const invList = document.getElementById('inv-list');
        if (allProducts.length === 0) {
            invList.innerHTML = `<div class="text-center text-xs text-antTextSecondary py-4">No items added yet.</div>`;
        }
        allProducts.forEach(p => {
            invList.innerHTML += `
            <div class="bg-antBg p-2 sm:p-3 rounded-lg border border-antBorder flex justify-between items-center text-xs sm:text-sm">
                <div><span class="font-bold text-antText">${p.name}</span> <span class="text-antTextSecondary text-[10px] sm:text-xs bg-white px-1 border border-antBorder rounded ml-1">${p.category || 'None'}</span>
                <div class="text-[10px] sm:text-xs text-antTextSecondary mt-0.5">${p.price.toLocaleString()} Ks | Stock: ${p.quantity}</div></div>
                <button onclick="deleteProduct('${p.id}')" class="text-red-400 hover:text-red-600 transition p-2 sm:p-1"><i class="ph ph-trash text-base sm:text-lg"></i></button>
            </div>`;
        });

        document.getElementById('save-item-btn').onclick = async () => {
            const name = document.getElementById('new-p-name').value.trim(), category = document.getElementById('new-p-cat').value.trim(), price = parseFloat(document.getElementById('new-p-price').value), quantity = parseInt(document.getElementById('new-p-qty').value), sku = document.getElementById('new-p-sku').value.trim();
            if (!name || !category || isNaN(price) || isNaN(quantity)) return alert("Please fill required fields.");
            const btn = document.getElementById('save-item-btn'); btn.innerText = "Saving..."; btn.disabled = true;
            try { await addDoc(collection(db, "shops", shop_id, "products"), { name, category, price, quantity, sku, lowStockThreshold: 5 }); window.renderInventoryModal(); } 
            catch (err) { alert("Error: " + err.message); btn.innerText = "Add Item"; btn.disabled = false; }
        };
    };
    window.deleteProduct = async (id) => { if (confirm('Delete this product?')) { await deleteDoc(doc(db, "shops", shop_id, "products", id)); window.renderInventoryModal(); } };

    // ---- CUSTOMERS MODAL ----
    document.getElementById('btn-customers').onclick = () => { window.renderCustomerDirectory(); };
    window.renderCustomerDirectory = () => {
        openModal(`
            <div class="flex justify-between items-center mb-4 sm:mb-6 border-b border-antBorder pb-3 sm:pb-4"><h2 class="text-lg sm:text-xl font-bold flex items-center gap-2"><i class="ph ph-users text-antPrimary"></i> Customers</h2><button onclick="closeModal()" class="text-antTextSecondary hover:text-red-500"><i class="ph ph-x text-xl"></i></button></div>
            <button onclick="renderAddCustomerForm()" class="w-full bg-antBg border border-antBorder border-dashed text-antPrimary hover:border-antPrimary hover:bg-blue-50 py-2.5 sm:py-3 rounded-lg mb-4 flex justify-center items-center gap-2 font-medium transition text-sm sm:text-base"><i class="ph ph-plus"></i> New Customer</button>
            <div id="customer-list" class="space-y-2 max-h-[50vh] overflow-y-auto no-scrollbar pr-1"></div>
        `);
        onSnapshot(collection(db, "shops", shop_id, "customers"), (snap) => {
            const list = document.getElementById('customer-list'); if (!list) return; list.innerHTML = '';
            snap.forEach(d => {
                const c = d.data();
                list.innerHTML += `<div class="bg-white p-2 sm:p-3 rounded-lg border border-antBorder flex justify-between items-center hover:shadow-sm transition">
                    <div class="flex items-center gap-2 sm:gap-3"><div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-antBg flex items-center justify-center text-antTextSecondary"><i class="ph ph-user"></i></div>
                    <div><div class="font-bold text-xs sm:text-sm text-antText">${c.name}</div><div class="text-[10px] sm:text-xs text-antTextSecondary mt-0.5">${c.phone || 'No Phone'}</div></div></div>
                    <div class="flex items-center gap-2 sm:gap-4"><span class="text-antPrimary font-medium text-[10px] sm:text-sm border border-blue-100 bg-blue-50 px-1 sm:px-2 py-0.5 rounded">${c.points || 0} pts</span><button onclick="deleteCustomer('${d.id}')" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-1.5 sm:p-2 rounded transition"><i class="ph ph-trash text-base sm:text-lg"></i></button></div>
                </div>`;
            });
        });
    };

    window.renderAddCustomerForm = () => {
        openModal(`
            <div class="flex justify-between items-center mb-4 sm:mb-6 border-b border-antBorder pb-3 sm:pb-4"><h2 class="text-lg sm:text-xl font-bold flex items-center gap-2"><i class="ph ph-user-plus text-antPrimary"></i> Add Customer</h2><button onclick="renderCustomerDirectory()" class="text-antTextSecondary hover:text-antPrimary transition flex items-center gap-1 font-medium text-xs sm:text-sm"><i class="ph ph-arrow-left"></i> Back</button></div>
            <div class="space-y-3 sm:space-y-4">
                <div><label class="block text-xs sm:text-sm font-medium text-antTextSecondary mb-1">Name *</label><input id="new-c-name" type="text" class="w-full px-3 py-2 sm:py-2.5 border border-antBorder rounded-lg outline-none focus:border-antPrimary transition text-sm"></div>
                <div><label class="block text-xs sm:text-sm font-medium text-antTextSecondary mb-1">Phone</label><input id="new-c-phone" type="text" class="w-full px-3 py-2 sm:py-2.5 border border-antBorder rounded-lg outline-none focus:border-antPrimary transition text-sm"></div>
                <div><label class="block text-xs sm:text-sm font-medium text-antTextSecondary mb-1">Note</label><textarea id="new-c-address" rows="2" class="w-full px-3 py-2 sm:py-2.5 border border-antBorder rounded-lg outline-none focus:border-antPrimary transition text-sm"></textarea></div>
                <div class="flex gap-2 sm:gap-3 pt-3 sm:pt-4 border-t border-antBorder mt-4 sm:mt-6"><button onclick="renderCustomerDirectory()" class="flex-1 px-3 py-2 sm:py-2.5 border border-antBorder rounded-lg font-bold hover:bg-antBg transition text-antTextSecondary text-sm sm:text-base">Cancel</button><button id="save-cust-btn" class="flex-1 bg-antPrimary text-white px-3 py-2 sm:py-2.5 rounded-lg font-bold hover:bg-antPrimaryHover shadow-sm transition text-sm sm:text-base">Save</button></div>
            </div>
        `);
        document.getElementById('save-cust-btn').onclick = async () => {
            const name = document.getElementById('new-c-name').value.trim(), phone = document.getElementById('new-c-phone').value.trim(), address = document.getElementById('new-c-address').value.trim();
            if (!name) return alert("Please enter customer name!");
            try { await addDoc(collection(db, "shops", shop_id, "customers"), { name, phone, address, points: 0 }); window.renderCustomerDirectory(); } 
            catch (err) { alert("Error: " + err.message); }
        };
    };
    window.deleteCustomer = async (id) => { if (confirm('Delete customer?')) await deleteDoc(doc(db, "shops", shop_id, "customers", id)); };

    // ---- REPORTS MODAL ----
    document.getElementById('btn-reports').onclick = async () => {
        const today = new Date(); today.setHours(0,0,0,0); const weekAgo = new Date(Date.now() - 7*86400000);
        const salesSnap = await getDocs(query(collection(db, "shops", shop_id, "sales"), orderBy("createdAt", "desc")));
        let todayTotal = 0, weekTotal = 0; const itemCount = {};
        salesSnap.forEach(doc => {
            const s = doc.data(); if (s.createdAt) { const d = s.createdAt.toDate(); if (d >= today) todayTotal += s.total; if (d >= weekAgo) weekTotal += s.total; }
            if (s.items) s.items.forEach(it => { itemCount[it.name] = (itemCount[it.name] || 0) + it.qty; });
        });
        const best = Object.entries(itemCount).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>`${e[0]} (${e[1]})`).join('<br>');
        let invVal = 0; allProducts.forEach(p => invVal += p.price * p.quantity);
        openModal(`
            <div class="flex justify-between items-center mb-4 sm:mb-6 border-b border-antBorder pb-3 sm:pb-4"><h2 class="text-lg sm:text-xl font-bold flex items-center gap-2"><i class="ph ph-chart-bar text-antPrimary"></i> Reports</h2><button onclick="closeModal()" class="text-antTextSecondary hover:text-red-500"><i class="ph ph-x text-xl"></i></button></div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 mb-4 sm:mb-6">
                <div class="bg-blue-50 border border-blue-100 p-3 sm:p-4 rounded-lg"><div class="text-xs sm:text-sm text-antTextSecondary">Today Sales</div><div class="text-lg sm:text-2xl font-bold text-antPrimary">${todayTotal.toLocaleString()} Ks</div></div>
                <div class="bg-blue-50 border border-blue-100 p-3 sm:p-4 rounded-lg"><div class="text-xs sm:text-sm text-antTextSecondary">Weekly Sales</div><div class="text-lg sm:text-2xl font-bold text-antPrimary">${weekTotal.toLocaleString()} Ks</div></div>
                <div class="bg-antBg border border-antBorder p-3 sm:p-4 rounded-lg"><div class="text-xs sm:text-sm text-antTextSecondary">Inventory Value</div><div class="text-base sm:text-xl font-bold text-antText">${invVal.toLocaleString()} Ks</div></div>
                <div class="bg-antBg border border-antBorder p-3 sm:p-4 rounded-lg"><div class="text-xs sm:text-sm text-antTextSecondary">Top Sellers</div><div class="text-xs sm:text-sm font-medium mt-1 leading-relaxed line-clamp-3">${best || 'N/A'}</div></div>
            </div>
            <div class="flex flex-col sm:flex-row justify-end gap-2 sm:gap-3 mt-4"><button onclick="closeModal()" class="w-full sm:w-auto px-4 py-2 rounded-lg border border-antBorder hover:bg-antBg transition font-medium text-sm sm:text-base">Cancel</button><button id="export-excel" class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center justify-center gap-2 transition font-medium text-sm sm:text-base"><i class="ph ph-file-xls"></i> Export Excel</button></div>
        `);
        document.getElementById('export-excel').onclick = async () => {
            const snap = await getDocs(query(collection(db, "shops", shop_id, "sales"), orderBy("createdAt", "desc")));
            const data = [['Date', 'Total', 'Payment', 'Items']];
            snap.forEach(d => { const s = d.data(); data.push([s.createdAt ? s.createdAt.toDate().toLocaleString() : 'N/A', s.total, s.paymentMethod, s.items ? s.items.map(i=>`${i.name}x${i.qty}`).join(', ') : '']); });
            const ws = XLSX.utils.aoa_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Sales'); XLSX.writeFile(wb, 'sales_report.xlsx');
        };
    };

    // ---- SHIFT MODAL ----
    document.getElementById('btn-shift').onclick = () => {
        openModal(`
            <div class="flex justify-between items-center mb-4 sm:mb-6 border-b border-antBorder pb-3 sm:pb-4"><h2 class="text-lg sm:text-xl font-bold flex items-center gap-2"><i class="ph ph-clock text-antPrimary"></i> Shift</h2><button onclick="closeModal()" class="text-antTextSecondary hover:text-red-500"><i class="ph ph-x text-xl"></i></button></div>
            <div class="flex gap-2 sm:gap-4 mb-4 sm:mb-6"><button id="clock-in" class="flex-1 bg-green-50 border border-green-200 text-green-600 hover:bg-green-500 hover:text-white py-2.5 sm:py-3 rounded-lg font-bold flex items-center justify-center gap-1 sm:gap-2 transition text-sm sm:text-base"><i class="ph ph-sign-in text-base sm:text-lg"></i> Clock In</button><button id="clock-out" class="flex-1 bg-red-50 border border-red-200 text-red-600 hover:bg-red-500 hover:text-white py-2.5 sm:py-3 rounded-lg font-bold flex items-center justify-center gap-1 sm:gap-2 transition text-sm sm:text-base"><i class="ph ph-sign-out text-base sm:text-lg"></i> Clock Out</button></div>
            <h3 class="text-xs sm:text-sm font-bold text-antTextSecondary uppercase tracking-widest mb-2 sm:mb-3">Logs</h3><div id="shift-log" class="space-y-2 max-h-[40vh] overflow-y-auto no-scrollbar"></div>
        `);
        document.getElementById('clock-in').onclick = () => { if(auth.currentUser) addDoc(collection(db, "shops", shop_id, "shifts"), { userId: auth.currentUser.uid, type: 'in', time: serverTimestamp() }); };
        document.getElementById('clock-out').onclick = () => { if(auth.currentUser) addDoc(collection(db, "shops", shop_id, "shifts"), { userId: auth.currentUser.uid, type: 'out', time: serverTimestamp() }); };
        onSnapshot(query(collection(db, "shops", shop_id, "shifts"), where("userId", "==", auth.currentUser.uid), orderBy("time", "desc")), (snap) => {
            const log = document.getElementById('shift-log'); if (!log) return; log.innerHTML = '';
            snap.forEach(d => {
                const s = d.data(); const icon = s.type === 'in' ? '<i class="ph ph-arrow-right text-green-500"></i>' : '<i class="ph ph-arrow-left text-red-500"></i>';
                log.innerHTML += `<div class="bg-antBg px-3 sm:px-4 py-2 sm:py-3 rounded-lg border border-antBorder flex justify-between items-center text-xs sm:text-sm font-medium text-antText"><div class="flex items-center gap-1.5 sm:gap-2">${icon} ${s.type === 'in' ? 'In' : 'Out'}</div><div class="text-antTextSecondary">${s.time?.toDate().toLocaleString()}</div></div>`;
            });
        });
    };
</script>
</body>
</html>
