<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swift POS - Ultimate Bilingual SaaS Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Padauk:wght@400;700&display=swap" rel="stylesheet">

        tailwind.config = {

                        brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },

                }
            }
        }
    </script>
    <style>
        @media print { body * { visibility: hidden; } #r-p, #r-p * { visibility: visible; } #r-p { position: absolute; left: 0; top: 0; width: 58mm; font-size: 12px; color: black; background: white;} }

        body { touch-action: manipulation; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

</head>
<body class="bg-slate-50 h-[100dvh] flex flex-col text-slate-800 overflow-hidden w-full selection:bg-brand-500/20">

<div id="pos-login" class="flex items-center justify-center h-[100dvh] bg-slate-50 z-50 absolute inset-0 p-4">
    <div class="bg-white p-8 sm:p-12 rounded-3xl shadow-xl shadow-slate-200/50 w-full max-w-md border border-slate-100 text-center relative">
        <div class="w-16 h-16 bg-brand-50 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm border border-brand-100">
            <i class="ph ph-storefront text-4xl text-brand-600"></i>
        </div>
        <h2 class="text-2xl sm:text-3xl font-black mb-2 text-slate-900 tracking-tight">Sign in to Workspace</h2>
        <p class="text-slate-500 mb-8 text-sm font-medium">Swift POS Management System</p>
        
        <div class="space-y-4">
            <div class="relative">
                <input id="u" type="text" placeholder="Username" class="w-full px-5 py-3.5 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 transition text-sm sm:text-base font-medium placeholder-slate-400">
            </div>
            <div class="relative">
                <input id="p" type="password" placeholder="Password" class="w-full px-5 py-3.5 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 focus:ring-4 focus:ring-brand-500/10 transition text-sm sm:text-base font-medium placeholder-slate-400">
            </div>
            <button id="l-btn" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-xl shadow-md shadow-brand-600/20 active:scale-[0.98] transition-all text-sm sm:text-base mt-2">Sign In</button>
            <p id="l-err" class="text-red-500 text-xs mt-4 hidden bg-red-50 border border-red-100 p-3 rounded-lg font-medium"></p>
        </div>
    </div>
</div>

<div id="pos-main" class="hidden h-[100dvh] w-full overflow-hidden bg-slate-50">

            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 space-y-1">
            <p data-i18n="nav" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 ml-2 mt-2">Navigation</p>
            <button class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg bg-brand-50 text-brand-700 font-semibold transition text-sm">
                <i class="ph ph-squares-four text-lg"></i> <span data-i18n="pos">Point of Sale</span>
            </button>
            <button id="btn-items" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 font-medium transition text-sm">

            <button id="btn-customers" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 font-medium transition text-sm">

            <button id="btn-history" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 font-medium transition text-sm">
                <i class="ph ph-receipt text-lg"></i> <span data-i18n="history">Transactions</span>
            </button>
            <button id="btn-reports" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 hover:bg-slate-50 hover:text-slate-900 font-medium transition text-sm">

            </button>
        </div>

                <span id="lang-ind-d" class="font-bold text-brand-600">EN</span>
            </button>
            <button id="lo-btn" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-red-600 hover:bg-red-50 font-medium transition text-sm">
                <i class="ph ph-sign-out text-lg"></i> <span data-i18n="signout">Sign Out</span>
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0 h-full relative">

            <div class="flex items-center gap-2 lg:hidden">

                <h1 class="font-bold text-slate-900 text-sm truncate max-w-[80px]">SWIFT POS</h1>
            </div>

            <div class="flex-1 max-w-2xl flex items-center gap-2 bg-slate-100 px-3 py-2 rounded-xl border border-transparent focus-within:border-brand-500 focus-within:bg-white focus-within:ring-4 focus-within:ring-brand-500/10 transition">
                <i class="ph ph-magnifying-glass text-slate-400 text-lg shrink-0"></i>
                <input id="barcode-input" type="text" data-i18n-ph="search" placeholder="Search product or scan barcode..." class="bg-transparent border-none outline-none w-full text-sm font-medium text-slate-900 placeholder-slate-500">
                <button id="clear-barcode" class="text-slate-400 hover:text-slate-700 shrink-0"><i class="ph ph-x-circle text-lg"></i></button>
            </div>

            <div class="flex lg:hidden items-center gap-1">
                <button onclick="toggleLang()" class="p-2 text-brand-600 bg-brand-50 font-bold text-xs rounded-lg border border-brand-100" id="lang-ind-m">EN</button>
                <button id="btn-menu-m" onclick="toggleMobileMenu()" class="p-2 text-slate-600 bg-slate-100 rounded-lg"><i class="ph ph-list text-lg"></i></button>
            </div>
        </header>

        <div class="flex-1 flex flex-col overflow-hidden relative">
            <div class="bg-white/80 backdrop-blur-sm border-b border-slate-200 shrink-0 z-10">
                <div id="category-sidebar" class="flex flex-row gap-2 overflow-x-auto no-scrollbar p-3 sm:p-4 items-center">
                    </div>
            </div>

            <main class="flex-1 overflow-y-auto p-3 sm:p-4 lg:p-6 pb-24 lg:pb-6">
                <div id="p-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-5 gap-3 lg:gap-5">
                    </div>
            </main>
        </div>
        
        <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-3 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-30 flex justify-between items-center">
            <div>
                <p data-i18n="total_bal" class="text-xs text-slate-500 font-medium">Total Balance</p>
                <p id="mobile-cart-total" class="text-lg font-black text-slate-900">0.00 Ks</p>
            </div>
            <button onclick="toggleMobileCart()" class="bg-brand-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 shadow-md shadow-brand-600/20 active:scale-95 transition-transform">
                <i class="ph ph-shopping-bag text-lg"></i> <span data-i18n="view_order">View Order</span>
            </button>
        </div>
    </div>

    <div id="cart-overlay" onclick="toggleMobileCart()" class="lg:hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>
    
    <aside id="cart-panel" class="fixed lg:relative inset-y-0 right-0 z-50 w-full sm:w-[400px] lg:w-[380px] xl:w-[400px] bg-white border-l border-slate-200 shadow-2xl lg:shadow-none transform translate-x-full lg:translate-x-0 transition-transform duration-300 flex flex-col h-[100dvh] lg:h-full">
        
        <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-white shrink-0">
            <h2 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                <i class="ph ph-shopping-bag text-brand-600"></i> <span data-i18n="order">Current Order</span>
            </h2>
            <div class="flex items-center gap-2">
                <button onclick="holdOrder()" title="Hold Order" class="p-1.5 text-orange-500 bg-orange-50 hover:bg-orange-100 rounded-lg transition-colors"><i class="ph ph-pause-circle text-lg"></i></button>
                <button onclick="viewHeldOrders()" title="View Held Orders" class="p-1.5 text-blue-500 bg-blue-50 hover:bg-blue-100 rounded-lg transition-colors relative">
                    <i class="ph ph-list-dashes text-lg"></i><span id="held-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold px-1.5 rounded-full hidden">0</span>
                </button>
                <button onclick="clearCart()" class="text-xs font-semibold text-red-600 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg transition-colors" data-i18n="clear">Clear</button>
                <button onclick="toggleMobileCart()" class="lg:hidden p-1.5 text-slate-400 bg-slate-100 rounded-lg"><i class="ph ph-x text-lg"></i></button>
            </div>
        </div>

        <div class="p-3 border-b border-slate-100 bg-slate-50/50 shrink-0">
            <div class="flex items-center gap-2 bg-white px-3 py-2 rounded-xl border border-slate-200 focus-within:border-brand-500 focus-within:ring-4 focus-within:ring-brand-500/10 transition shadow-sm">
                <i class="ph ph-user text-slate-400"></i>
                <select id="customer-select" class="w-full bg-transparent border-none outline-none text-sm font-semibold text-slate-700 cursor-pointer appearance-none">
                    <option value="" data-i18n="walkin">Walk-in Customer</option>
                </select>
                <i class="ph ph-caret-down text-slate-400 text-xs"></i>
            </div>
        </div>

        <div id="c-list" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/30">
            <div class="text-center py-20 opacity-50 flex flex-col items-center">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-3"><i class="ph ph-shopping-cart text-3xl text-slate-400"></i></div>
                <p data-i18n="empty" class="font-medium text-sm text-slate-500">Cart is empty</p>
            </div>
        </div>

        <div class="p-4 bg-white border-t border-slate-200 shadow-[0_-4px_10px_rgba(0,0,0,0.02)] shrink-0">

                    <span data-i18n="disc" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Disc%</span>
                    <input id="discount" type="number" value="0" class="w-14 text-right border-none outline-none text-sm font-bold text-slate-900 bg-transparent">
                </div>
                <div class="flex-1 bg-white border border-slate-200 rounded-xl p-2 flex items-center justify-between shadow-sm focus-within:border-brand-500 transition">
                    <span data-i18n="tax" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider ml-1">Tax%</span>
                    <input id="tax" type="number" value="0" class="w-14 text-right border-none outline-none text-sm font-bold text-slate-900 bg-transparent">
                </div>
            </div>

            <div class="mb-4 bg-white border border-slate-200 rounded-xl p-2.5 flex items-center shadow-sm focus-within:border-brand-500 transition">
                <div class="bg-indigo-50 p-1.5 rounded-lg ml-1 mr-2"><i class="ph ph-wallet text-brand-600"></i></div>
                <select id="payment-method" class="w-full bg-transparent border-none outline-none text-sm font-semibold text-slate-700 appearance-none cursor-pointer">
                    <option value="Cash">Cash</option><option value="Card">Card</option><option value="KPay">KPay</option><option value="WavePay">WavePay</option>
                </select>
                <i class="ph ph-caret-down text-slate-400 text-xs pr-2"></i>
            </div>

            <div id="cart-summary" class="space-y-1.5 mb-4 text-sm font-medium border-t border-slate-100 pt-3">
                <div class="flex justify-between text-slate-500"><span data-i18n="subtotal">Subtotal</span><span class="text-slate-700">0.00</span></div>
                <div class="flex justify-between text-slate-500"><span data-i18n="discount">Discount</span><span class="text-red-500">0.00</span></div>
                <div class="flex justify-between items-end mt-2 pt-2 border-t border-slate-100">
                    <span data-i18n="total" class="text-base font-bold text-slate-900">Total</span>
                    <span class="text-2xl font-black text-brand-600">0.00 Ks</span>
                </div>
            </div>

            <button id="chk-btn" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-3.5 rounded-xl shadow-lg shadow-slate-900/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-base">
                <i class="ph ph-receipt text-xl"></i> <span data-i18n="pay">Charge & Print</span>
            </button>
        </div>
    </aside>

</div>

<div id="mob-menu-overlay" onclick="toggleMobileMenu()" class="lg:hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>
<div id="mob-menu" class="lg:hidden fixed inset-y-0 left-0 z-50 w-64 bg-white shadow-2xl transform -translate-x-full transition-transform duration-300 flex flex-col h-[100dvh]">

</div>

<div id="r-p" class="hidden"></div>

    const firebaseConfig = {

        authDomain: "ascedia-60dd4.firebaseapp.com",
        databaseURL: "https://ascedia-60dd4-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ascedia-60dd4",

        <button id="btn-reports-m2" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-slate-600 hover:bg-slate-50 font-medium transition text-sm"><i class="ph ph-chart-line-up text-lg"></i> <span data-i18n="reports">Reports</span></button>
        <button id="btn-shift-m" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-slate-600 hover:bg-slate-50 font-medium transition text-sm"><i class="ph ph-clock text-lg"></i> <span data-i18n="shifts">Shift Logs</span></button>
        <button id="btn-settings-m" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-slate-600 hover:bg-slate-50 font-medium transition text-sm"><i class="ph ph-gear text-lg"></i> <span data-i18n="settings">Settings</span></button>
        <div class="border-t border-slate-100 mt-2 pt-2"><button id="lo-btn-m" class="w-full flex items-center gap-3 px-3 py-3 rounded-lg text-red-600 hover:bg-red-50 font-medium transition text-sm"><i class="ph ph-sign-out text-lg"></i> <span data-i18n="signout">Sign Out</span></button></div>
    `;

    const updateText = (id, txt) => { const el = document.getElementById(id); if (el) el.innerText = txt; };

    // Mobile UI Toggles
    window.toggleMobileCart = () => {
        const panel = document.getElementById('cart-panel');
        const overlay = document.getElementById('cart-overlay');
        if (panel.classList.contains('translate-x-full')) {
            overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            panel.classList.remove('translate-x-full');
        } else {
            panel.classList.add('translate-x-full'); overlay.classList.add('opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }
    };

    window.toggleMobileMenu = () => {
        const menu = document.getElementById('mob-menu');
        const overlay = document.getElementById('mob-menu-overlay');
        if (menu.classList.contains('-translate-x-full')) {
            overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            menu.classList.remove('-translate-x-full');
        } else {
            menu.classList.add('-translate-x-full'); overlay.classList.add('opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }
    };

    // ---- AUTH ----
    document.getElementById('l-btn').onclick = async () => {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value;
        const err = document.getElementById('l-err');
        if (err) err.classList.add('hidden');

        if (u === 'master' && p === 'master123') {
            shop_id = 'master_shop'; shop_name = 'SWIFT TEST STORE'; userRole = 'owner';
            updateText('s-name', shop_name);
            document.getElementById('pos-login').style.display = 'none';
            const mainApp = document.getElementById('pos-main'); mainApp.classList.remove('hidden'); mainApp.style.display = 'flex';
            loadProducts(); loadSettings(); return;
        }

        try {
            document.getElementById('l-btn').innerText = "Authenticating...";
            const cred = await signInWithEmailAndPassword(auth, `${u}@pos.local`, p);
            const userDoc = await getDoc(doc(db, "users", cred.user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                if (new Date() > new Date(data.expiryDate)) { signOut(auth); throw new Error("Subscription Expired! Contact Admin."); }
                shop_id = data.shopId; shop_name = data.shopName; userRole = data.role || 'staff';
                updateText('s-name', shop_name);
                document.getElementById('pos-login').style.display = 'none';
                const mainApp = document.getElementById('pos-main'); mainApp.classList.remove('hidden'); mainApp.style.display = 'flex';
                loadProducts(); loadSettings();
            }
        } catch (e) { if (err) { err.innerText = e.message; err.classList.remove('hidden'); } }
        document.getElementById('l-btn').innerText = "Sign In";
    };

    const handleLogout = () => { signOut(auth); location.reload(); };
    document.getElementById('lo-btn').onclick = handleLogout;
    document.getElementById('lo-btn-m').onclick = handleLogout;

    // Load Settings
    async function loadSettings() {
        if(!shop_id) return;
        const sDoc = await getDoc(doc(db, "shops", shop_id, "settings", "general"));
        if(sDoc.exists()) {
            shop_settings = sDoc.data();
            updateText('s-name', shop_settings.shopName || shop_name);
            shop_name = shop_settings.shopName || shop_name;
        }
    }

    // ---- LOAD PRODUCTS & CATEGORIES ----
    function loadProducts() {
        if (!shop_id) return;
        onSnapshot(query(collection(db, "shops", shop_id, "products"), orderBy("name")), (snap) => {
            allProducts = []; const categories = new Set();
            snap.forEach(d => {
                const p = { id: d.id, ...d.data() }; allProducts.push(p);
                if (p.category && p.category.trim() !== '') categories.add(p.category.trim());
            });
            renderCategorySidebar(['All', ...Array.from(categories)]);
            renderProductGrid();
        });
    }

    function renderCategorySidebar(categories) {
        const sidebar = document.getElementById('category-sidebar'); if (!sidebar) return;
        sidebar.innerHTML = '';
        categories.forEach(cat => {
            const isActive = cat === currentCategory;
            const activeClass = isActive ? 'bg-slate-900 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50';
            sidebar.innerHTML += `
            <button onclick="setCategory('${cat}')" class="${activeClass} px-4 py-2 rounded-xl flex items-center gap-2 transition-all shrink-0 whitespace-nowrap">
                <span class="text-xs sm:text-sm font-bold">${cat === 'All' ? (currentLang === 'mm' ? 'အားလုံး' : 'All') : cat}</span>
            </button>`;
        });
    }

    window.setCategory = (cat) => { currentCategory = cat; renderCategorySidebar(['All', ...Array.from(new Set(allProducts.map(p => p.category).filter(Boolean)))]); renderProductGrid(); };

    function renderProductGrid() {
        const grid = document.getElementById('p-grid'); if (!grid) return; grid.innerHTML = '';
        const filteredProducts = currentCategory === 'All' ? allProducts : allProducts.filter(p => p.category === currentCategory);
            
        if (filteredProducts.length === 0) {
            grid.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center text-center py-20 opacity-60"><div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 shadow-sm border border-slate-100"><i class="ph ph-package text-4xl text-slate-400"></i></div><p class="text-slate-600 font-bold text-lg">No items available</p></div>`; return;
        }

        filteredProducts.forEach(p => {
            const isLow = p.quantity <= (p.lowStockThreshold || 5);
            const stockClass = isLow ? 'text-red-600 bg-red-50 border-red-100' : 'text-slate-500 bg-slate-100 border-transparent';
            grid.innerHTML += `
            <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden hover:shadow-lg hover:-translate-y-1 hover:border-brand-300 cursor-pointer transition-all duration-300 flex flex-col relative" onclick="addToCart('${p.id}')">
                <div class="h-24 sm:h-28 bg-slate-50 flex items-center justify-center relative border-b border-slate-100">
                    <div class="text-slate-400 text-2xl font-black opacity-20 uppercase">${p.name.substring(0,2)}</div>
                    ${p.category ? `<span class="absolute top-2 right-2 bg-white text-[10px] font-bold px-2 py-1 rounded-lg text-slate-600 border border-slate-200 shadow-sm">${p.category}</span>` : ''}
                </div>
                <div class="p-3 sm:p-4 flex flex-col flex-1 justify-between bg-white">
                    <div class="text-sm font-bold leading-tight mb-2 text-slate-800 line-clamp-2">${p.name}</div>
                    <div class="flex items-end justify-between mt-auto">
                        <div class="text-brand-600 font-black text-base sm:text-lg">${p.price.toLocaleString()} Ks</div>
                        <div class="text-[10px] px-2 py-1 rounded border font-bold ${stockClass}">${p.quantity} Left</div>
                    </div>
                </div>
            </div>`;
        });
    }

    // ---- CART & CHECKOUT ----
    window.addToCart = async (productId) => {
        const product = allProducts.find(p => p.id === productId); if (!product) return;
        const existing = window.cart.find(item => item.id === product.id);
        if (existing) { if (existing.qty < product.quantity) existing.qty++; else return alert('Out of stock!'); } 
        else { if (product.quantity > 0) window.cart.push({ ...product, qty: 1 }); else return alert('Out of stock!'); }
        renderCart();
    };

    document.getElementById('barcode-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const code = e.target.value.trim().toLowerCase();
            if (code) { const product = allProducts.find(p => p.sku && p.sku.toLowerCase() === code); if (product) addToCart(product.id); else alert('Not found: ' + code); }
            e.target.value = '';
        }
    });
    document.getElementById('clear-barcode').onclick = () => { document.getElementById('barcode-input').value = ''; };

    window.clearCart = () => { window.cart = []; renderCart(); };

    function renderCart() {
        const list = document.getElementById('c-list'); if (!list) return; list.innerHTML = '';
        if (window.cart.length === 0) {
            list.innerHTML = `<div class="text-center py-20 opacity-60 flex flex-col items-center"><div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mb-3"><i class="ph ph-shopping-cart text-3xl text-slate-400"></i></div><p class="font-medium text-sm text-slate-500">${t('empty')}</p></div>`;
            updateCartSummary(); return;
        }

        const grouped = window.cart.reduce((a, c) => { const found = a.find(x => x.id === c.id); if (found) { found.qty++; } else { a.push({ ...c, qty: 1 }); } return a; }, []);
        grouped.forEach(item => {
            list.innerHTML += `
            <div class="flex justify-between items-center group border border-slate-100 mb-2 bg-white hover:border-brand-200 p-2.5 rounded-xl transition-all shadow-sm">
                <div class="flex gap-3 items-center"><div class="w-8 h-8 rounded-lg border border-slate-100 flex items-center justify-center text-xs font-bold text-slate-600 bg-slate-50 shrink-0">x${item.qty}</div>
                <div><div class="text-sm font-bold text-slate-800 leading-tight line-clamp-1">${item.name}</div><div class="text-[11px] font-semibold text-slate-400 mt-0.5">${item.price.toLocaleString()} Ks</div></div></div>
                <div class="flex items-center gap-3 shrink-0"><div class="text-sm font-bold text-slate-800">${(item.price * item.qty).toLocaleString()}</div><button onclick="removeFromCart('${item.id}')" class="text-slate-400 hover:text-red-500 hover:bg-red-50 p-1.5 rounded-lg transition-colors"><i class="ph ph-trash text-lg"></i></button></div>
            </div>`;
        });
        updateCartSummary();
    }
    
    window.removeFromCart = (id) => { window.cart = window.cart.filter(i => i.id !== id); renderCart(); };

    document.getElementById('discount').addEventListener('input', updateCartSummary);
    document.getElementById('tax').addEventListener('input', updateCartSummary);

    function updateCartSummary() {
        const subTotal = window.cart.reduce((sum, i) => sum + (i.price * (i.qty || 1)), 0);
        const disc = parseFloat(document.getElementById('discount')?.value) || 0;
        const tax = parseFloat(document.getElementById('tax')?.value) || 0;
        const total = (subTotal - (subTotal * disc / 100)) + ((subTotal - (subTotal * disc / 100)) * tax / 100);
        
        document.getElementById('cart-summary').innerHTML = `
            <div class="flex justify-between text-slate-500 font-semibold"><span>${t('subtotal')}</span><span class="text-slate-700">${subTotal.toLocaleString()}</span></div>
            <div class="flex justify-between text-slate-500 font-semibold"><span>${t('discount')} (${disc}%)</span><span class="text-red-500">-${(subTotal * disc / 100).toLocaleString()}</span></div>
            <div class="flex justify-between items-end mt-2 pt-2 border-t border-slate-100"><span class="text-base font-bold text-slate-800">${t('total')}</span><span class="text-xl lg:text-2xl font-black text-brand-600">${total.toLocaleString()} Ks</span></div>`;
        const mobileTotal = document.getElementById('mobile-cart-total'); if(mobileTotal) mobileTotal.innerText = `${total.toLocaleString()} Ks`;
    }

    // HOLD ORDER
    window.holdOrder = () => {
        if (window.cart.length === 0) return;
        heldOrders.push([...window.cart]);
        window.clearCart();
        document.getElementById('held-count').innerText = heldOrders.length;
        document.getElementById('held-count').classList.remove('hidden');
        alert(currentLang === 'en' ? "Order held successfully." : "အော်ဒါကို ခေတ္တဆိုင်းငံ့ထားပါသည်။");
    };

    window.viewHeldOrders = () => {
        if(heldOrders.length === 0) return alert(currentLang === 'en' ? "No held orders." : "ဆိုင်းငံ့ထားသော အော်ဒါမရှိပါ။");
        let html = `<div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4"><h2 class="text-xl font-bold flex items-center gap-2 text-slate-900"><i class="ph ph-pause-circle text-orange-500"></i> ${currentLang === 'en'?'Held Orders':'ဆိုင်းငံ့ထားသော အော်ဒါများ'}</h2><button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 bg-slate-50 p-2 rounded-lg transition-all"><i class="ph ph-x text-lg"></i></button></div><div class="space-y-3">`;
        heldOrders.forEach((order, idx) => {
            const total = order.reduce((s, i) => s + (i.price * (i.qty || 1)), 0);
            html += `<div class="bg-white p-4 rounded-xl border border-slate-200 flex justify-between items-center shadow-sm">
                <div><div class="font-bold text-slate-800">Order #${idx+1}</div><div class="text-xs text-slate-500">${order.length} items | ${total.toLocaleString()} Ks</div></div>
                <div class="flex gap-2"><button onclick="restoreOrder(${idx})" class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg font-bold text-sm">Restore</button><button onclick="deleteHeldOrder(${idx})" class="bg-red-50 text-red-600 p-1.5 rounded-lg"><i class="ph ph-trash"></i></button></div>
            </div>`;
        });
        openModal(html + '</div>');
    };

    window.restoreOrder = (idx) => {
        if(window.cart.length > 0) { if(!confirm("Current cart will be cleared. Continue?")) return; }
        window.cart = [...heldOrders[idx]];
        deleteHeldOrder(idx);
        closeModal(); renderCart();
    };
    window.deleteHeldOrder = (idx) => {
        heldOrders.splice(idx, 1);
        document.getElementById('held-count').innerText = heldOrders.length;
        if(heldOrders.length === 0) document.getElementById('held-count').classList.add('hidden');
        if(document.getElementById('modal').classList.contains('hidden') === false) viewHeldOrders(); // re-render
    };

    // CHECKOUT
    document.getElementById('chk-btn').onclick = async () => {
        if (window.cart.length === 0) return;
        const subTotal = window.cart.reduce((s, i) => s + (i.price * (i.qty || 1)), 0);
        const disc = parseFloat(document.getElementById('discount').value) || 0;
        const tax = parseFloat(document.getElementById('tax').value) || 0;
        const total = (subTotal - (subTotal * disc / 100)) + ((subTotal - (subTotal * disc / 100)) * tax / 100);
        const paymentMethod = document.getElementById('payment-method').value;
        const customerId = document.getElementById('customer-select').value;
        
        try {
            const batch = writeBatch(db);
            const saleRef = doc(collection(db, "shops", shop_id, "sales"));
            const itemsToSave = window.cart.map(i => ({ name: i.name, price: i.price, qty: i.qty || 1, productId: i.id, sku: i.sku }));
            batch.set(saleRef, {
                items: itemsToSave, subTotal, discount: disc, tax, total, paymentMethod, customerId: customerId || null,
                createdAt: serverTimestamp(), userId: auth.currentUser?.uid || null
            });
            window.cart.forEach(item => { batch.update(doc(db, "shops", shop_id, "products", item.id), { quantity: increment(-(item.qty || 1)) }); });
            if (customerId) { batch.update(doc(db, "shops", shop_id, "customers", customerId), { points: increment(Math.floor(total / 100)) }); }
            await batch.commit();
            
            // Print receipt
            printReceipt({items: itemsToSave, total, paymentMethod, date: new Date().toLocaleString()});
            
            window.clearCart(); document.getElementById('discount').value = 0; document.getElementById('tax').value = 0;
            if(!document.getElementById('cart-panel').classList.contains('translate-x-full')){ toggleMobileCart(); }
        } catch(e) { alert('Checkout error: ' + e.message); }
    };

    function printReceipt(data) {
        let h = `<center><h2 style="margin:0;font-weight:900;text-transform:uppercase;">${shop_name}</h2><p style="font-size:10px;color:#666;">VOUCHER - ${data.date}</p><hr style="border-top:1px dashed #000;margin:10px 0;"></center><table style="width:100%;font-size:12px;">`;
        const g = data.items.reduce((a, c) => { const f = a.find(x => x.name === c.name); if (f) { f.qty+=c.qty; f.tt += (c.price*c.qty); } else { a.push({ ...c, tt: c.price*c.qty }); } return a; }, []);
        g.forEach(i => h += `<tr><td style="padding:4px 0;">${i.name} x${i.qty}</td><td align="right">${i.tt.toLocaleString()}</td></tr>`);
        h += `</table><hr style="border-top:1px dashed #000;margin:10px 0;"><h3 align="right" style="margin:0;">TOTAL: ${data.total.toLocaleString()} Ks</h3><p align="right" style="font-size:10px;margin:2px 0;">(${data.paymentMethod})</p><center><p style="font-size:10px;margin-top:20px;">${shop_settings.footer || 'Thank you!'}</p></center>`;
        document.getElementById('r-p').innerHTML = h; window.print();
    }

    // ---- LOAD CUSTOMERS DROPDOWN ----
    const observer = new MutationObserver(() => {
        if (!document.getElementById('pos-main').classList.contains('hidden')) {
            onSnapshot(collection(db, "shops", shop_id, "customers"), (snap) => {
                const sel = document.getElementById('customer-select'); if (!sel) return;
                sel.innerHTML = `<option value="">${t('walkin')}</option>`;
                snap.forEach(d => { const c = d.data(); sel.innerHTML += `<option value="${d.id}">${c.name} (${c.points || 0} pts)</option>`; });
            });
        }
    });
    observer.observe(document.getElementById('pos-main'), { attributes: true, attributeFilter: ['class'] });

    // ---- MODALS & DIALOGS ----
    const modal = document.getElementById('modal'); const modalContent = document.getElementById('modal-content');
    function openModal(html) { modalContent.innerHTML = html; modal.classList.remove('hidden'); }
    window.closeModal = () => modal.classList.add('hidden');
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

    const linkButtons = (idDesk, idMob, idMob2, func) => {
        if(document.getElementById(idDesk)) document.getElementById(idDesk).onclick = func;
        if(document.getElementById(idMob)) document.getElementById(idMob).onclick = () => { toggleMobileMenu(); func(); };
        if(document.getElementById(idMob2)) document.getElementById(idMob2).onclick = func;
    }

    // ---- ITEMS MODAL ----
    const showItemsModal = () => {
        openModal(`
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4"><h2 class="text-xl font-bold flex items-center gap-2 text-slate-900"><i class="ph ph-package text-slate-500"></i> ${t('inventory')}</h2><button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 bg-slate-50 p-2 rounded-lg transition-all"><i class="ph ph-x text-lg"></i></button></div>
            <div class="space-y-4 bg-slate-50 p-5 rounded-2xl border border-slate-100 mb-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-2">Item Name *</label><input id="new-p-name" type="text" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 text-sm"></div>
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-2">Category *</label><input id="new-p-cat" type="text" list="cat-list" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 text-sm"><datalist id="cat-list">${Array.from(new Set(allProducts.map(p => p.category).filter(Boolean))).map(c => `<option value="${c}">`).join('')}</datalist></div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-2">Price (Ks) *</label><input id="new-p-price" type="number" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 text-sm"></div>
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-2">Stock Qty *</label><input id="new-p-qty" type="number" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 text-sm"></div>
                    <div><label class="block text-xs font-bold text-slate-500 uppercase mb-2">SKU</label><input id="new-p-sku" type="text" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl outline-none focus:border-brand-500 focus:ring-2 focus:ring-brand-500/20 text-sm"></div>
                </div>
                <div class="flex justify-end pt-2"><button id="save-item-btn" class="w-full sm:w-auto bg-slate-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-black transition-all text-sm">Save Product</button></div>
            </div>
            <div id="inv-list" class="space-y-2 max-h-[35vh] overflow-y-auto no-scrollbar pr-2"></div>
        `);
        const invList = document.getElementById('inv-list');
        allProducts.forEach(p => {
            invList.innerHTML += `<div class="bg-white p-3 rounded-xl border border-slate-200 flex justify-between items-center"><div><span class="font-bold text-slate-800 text-sm">${p.name}</span> <span class="text-slate-500 text-[10px] bg-slate-100 px-2 py-0.5 rounded-md ml-2">${p.category || 'None'}</span><div class="text-xs font-semibold text-slate-500 mt-1">${p.price.toLocaleString()} Ks | Stock: ${p.quantity}</div></div><button onclick="deleteProduct('${p.id}')" class="text-slate-400 hover:text-red-600 bg-slate-50 p-2 rounded-lg"><i class="ph ph-trash text-lg"></i></button></div>`;
        });
        document.getElementById('save-item-btn').onclick = async () => {
            const name = document.getElementById('new-p-name').value.trim(), category = document.getElementById('new-p-cat').value.trim(), price = parseFloat(document.getElementById('new-p-price').value), quantity = parseInt(document.getElementById('new-p-qty').value), sku = document.getElementById('new-p-sku').value.trim();
            if (!name || !category || isNaN(price) || isNaN(quantity)) return alert("Please fill required fields.");
            try { await addDoc(collection(db, "shops", shop_id, "products"), { name, category, price, quantity, sku, lowStockThreshold: 5 }); showItemsModal(); } catch (err) { alert("Error: " + err.message); }
        };
    };
    window.deleteProduct = async (id) => { if (confirm('Delete this product?')) { await deleteDoc(doc(db, "shops", shop_id, "products", id)); showItemsModal(); } };
    linkButtons('btn-items', 'btn-items-m', 'btn-items-m2', showItemsModal);

    // ---- CUSTOMERS MODAL ----
    const showCustomersModal = () => {
        openModal(`
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4"><h2 class="text-xl font-bold flex items-center gap-2 text-slate-900"><i class="ph ph-users text-slate-500"></i> ${t('customers')}</h2><button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 bg-slate-50 p-2 rounded-lg transition-all"><i class="ph ph-x text-lg"></i></button></div>
            <button onclick="renderAddCustomerForm()" class="w-full bg-slate-50 border border-slate-200 border-dashed text-slate-600 hover:border-brand-500 py-3.5 rounded-xl mb-6 font-bold text-sm">+ Add New Client</button>
            <div id="customer-list" class="space-y-3 max-h-[50vh] overflow-y-auto no-scrollbar pr-2"></div>
        `);
        onSnapshot(collection(db, "shops", shop_id, "customers"), (snap) => {
            const list = document.getElementById('customer-list'); if (!list) return; list.innerHTML = '';
            snap.forEach(d => {
                const c = d.data();
                list.innerHTML += `<div class="bg-white p-4 rounded-xl border border-slate-200 flex justify-between items-center"><div class="flex items-center gap-4"><div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center font-bold text-lg">${c.name.charAt(0)}</div><div><div class="font-bold text-sm">${c.name}</div><div class="text-xs text-slate-500">${c.phone || 'No Phone'}</div></div></div><div class="flex items-center gap-4"><span class="text-slate-700 font-bold text-xs bg-slate-100 px-3 py-1 rounded-lg">${c.points || 0} PTS</span><button onclick="deleteCustomer('${d.id}')" class="text-slate-400 hover:text-red-500 p-2"><i class="ph ph-trash text-lg"></i></button></div></div>`;
            });
        });
    };
    window.renderAddCustomerForm = () => {
        openModal(`
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4"><h2 class="text-xl font-bold flex items-center gap-2 text-slate-900">New Client</h2><button onclick="showCustomersModal()" class="text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg font-bold text-xs">Back</button></div>
            <div class="space-y-4 bg-slate-50 p-5 rounded-2xl border border-slate-100">
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-2">Name *</label><input id="new-c-name" type="text" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm"></div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-2">Phone</label><input id="new-c-phone" type="text" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm"></div>
                <div><label class="block text-xs font-bold text-slate-500 uppercase mb-2">Note</label><textarea id="new-c-address" rows="2" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm"></textarea></div>
                <div class="flex gap-3 pt-4"><button onclick="showCustomersModal()" class="flex-1 bg-white border border-slate-200 py-3 rounded-xl font-bold text-sm">Cancel</button><button id="save-cust-btn" class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-bold text-sm">Save</button></div>
            </div>
        `);
        document.getElementById('save-cust-btn').onclick = async () => {
            const name = document.getElementById('new-c-name').value.trim(), phone = document.getElementById('new-c-phone').value.trim(), address = document.getElementById('new-c-address').value.trim();
            if (!name) return; try { await addDoc(collection(db, "shops", shop_id, "customers"), { name, phone, address, points: 0 }); showCustomersModal(); } catch (err) { alert(err.message); }
        };
    };
    window.deleteCustomer = async (id) => { if (confirm('Delete client?')) await deleteDoc(doc(db, "shops", shop_id, "customers", id)); };
    linkButtons('btn-customers', 'btn-customers-m', 'btn-customers-m2', showCustomersModal);

    // ---- TRANSACTIONS HISTORY MODAL (NEW) ----
    const showHistoryModal = async () => {
        openModal(`<div class="text-center p-10 font-bold text-slate-500">Loading...</div>`);
        const q = query(collection(db, "shops", shop_id, "sales"), orderBy("createdAt", "desc"), limit(50));
        const snap = await getDocs(q);
        let html = `<div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4"><h2 class="text-xl font-bold flex items-center gap-2 text-slate-900"><i class="ph ph-receipt text-slate-500"></i> ${t('history')}</h2><button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 bg-slate-50 p-2 rounded-lg transition-all"><i class="ph ph-x text-lg"></i></button></div><div class="space-y-3">`;
        if(snap.empty) html += `<div class="text-center py-10 text-slate-400">No transactions found.</div>`;
        snap.forEach(d => {
            const s = d.data();
            const dateStr = s.createdAt ? s.createdAt.toDate().toLocaleString() : 'N/A';
            const itemsStr = s.items ? s.items.map(i=>i.name).join(', ') : '';
            html += `<div class="bg-white p-4 rounded-xl border border-slate-200 flex justify-between items-center shadow-sm">
                <div><div class="font-bold text-slate-800 text-sm">${dateStr}</div><div class="text-xs text-slate-500 line-clamp-1 max-w-[200px]">${itemsStr}</div></div>
                <div class="flex items-center gap-4"><div class="text-right"><div class="font-black text-brand-600">${s.total.toLocaleString()} Ks</div><div class="text-[10px] font-bold text-slate-400 uppercase">${s.paymentMethod}</div></div>
                <button onclick='reprintReceipt(${JSON.stringify({items: s.items, total: s.total, paymentMethod: s.paymentMethod, date: dateStr})})' class="bg-slate-100 p-2 rounded-lg text-slate-600 hover:text-brand-600"><i class="ph ph-printer text-lg"></i></button></div>
            </div>`;
        });
        openModal(html + `</div>`);
    };
    window.reprintReceipt = (data) => { printReceipt(data); };
    linkButtons('btn-history', 'btn-history-m', null, showHistoryModal);

    // ---- REPORTS MODAL ----
    const showReportsModal = async () => {
        const today = new Date(); today.setHours(0,0,0,0); const weekAgo = new Date(Date.now() - 7*86400000);
        const salesSnap = await getDocs(query(collection(db, "shops", shop_id, "sales"), orderBy("createdAt", "desc")));
        let todayTotal = 0, weekTotal = 0; const itemCount = {};
        salesSnap.forEach(doc => {
            const s = doc.data(); if (s.createdAt) { const d = s.createdAt.toDate(); if (d >= today) todayTotal += s.total; if (d >= weekAgo) weekTotal += s.total; }
            if (s.items) s.items.forEach(it => { itemCount[it.name] = (itemCount[it.name] || 0) + it.qty; });
        });
        const best = Object.entries(itemCount).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>`<div class="flex justify-between py-2 border-b border-slate-100 last:border-0"><span class="text-slate-700 text-sm font-medium">${e[0]}</span><span class="font-bold text-slate-900 text-sm">${e[1]} Sold</span></div>`).join('');
        let invVal = 0; allProducts.forEach(p => invVal += p.price * p.quantity);
        openModal(`
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4"><h2 class="text-xl font-bold flex items-center gap-2 text-slate-900"><i class="ph ph-chart-bar text-slate-500"></i> ${t('reports')}</h2><button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 bg-slate-50 p-2 rounded-lg transition-all"><i class="ph ph-x text-lg"></i></button></div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <div class="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm"><div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Today Revenue</div><div class="text-3xl font-black text-slate-900">${todayTotal.toLocaleString()} <span class="text-sm">Ks</span></div></div>
                <div class="bg-white border border-slate-200 p-5 rounded-2xl shadow-sm"><div class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">7-Day Revenue</div><div class="text-3xl font-black text-slate-900">${weekTotal.toLocaleString()} <span class="text-sm">Ks</span></div></div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-50 border border-slate-200 p-5 rounded-2xl"><div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Inventory Value</div><div class="text-xl font-bold text-slate-800">${invVal.toLocaleString()} Ks</div></div>
                <div class="bg-slate-50 border border-slate-200 p-5 rounded-2xl"><div class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Top Items</div><div>${best || '<span class="text-sm text-slate-400">No data</span>'}</div></div>
            </div>
            <div class="flex justify-end pt-4 border-t border-slate-100"><button id="export-excel" class="bg-white border border-slate-200 px-6 py-2.5 rounded-xl font-bold text-sm shadow-sm">Download Excel</button></div>
        `);
        document.getElementById('export-excel').onclick = async () => {
            const data = [['Date', 'Total', 'Payment', 'Items']];
            salesSnap.forEach(d => { const s = d.data(); data.push([s.createdAt ? s.createdAt.toDate().toLocaleString() : '', s.total, s.paymentMethod, s.items ? s.items.map(i=>`${i.name}x${i.qty}`).join(', ') : '']); });
            const ws = XLSX.utils.aoa_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, 'Sales'); XLSX.writeFile(wb, 'sales_report.xlsx');
        };
    };
    linkButtons('btn-reports', 'btn-reports-m', 'btn-reports-m2', showReportsModal);

    // ---- SHIFT MODAL ----
    const showShiftModal = () => {
        openModal(`
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4"><h2 class="text-xl font-bold flex items-center gap-2 text-slate-900"><i class="ph ph-clock text-slate-500"></i> ${t('shifts')}</h2><button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 bg-slate-50 p-2 rounded-lg transition-all"><i class="ph ph-x text-lg"></i></button></div>
            <div class="flex gap-4 mb-8"><button id="clock-in" class="flex-1 bg-white border border-slate-200 text-slate-700 hover:border-brand-500 hover:text-brand-600 py-4 rounded-2xl font-bold flex flex-col items-center gap-2 text-sm shadow-sm"><i class="ph ph-sign-in text-2xl"></i> Clock In</button><button id="clock-out" class="flex-1 bg-white border border-slate-200 text-slate-700 hover:border-red-500 hover:text-red-600 py-4 rounded-2xl font-bold flex flex-col items-center gap-2 text-sm shadow-sm"><i class="ph ph-sign-out text-2xl"></i> Clock Out</button></div>
            <div id="shift-log" class="space-y-3 max-h-[40vh] overflow-y-auto no-scrollbar"></div>
        `);
        document.getElementById('clock-in').onclick = () => { if(auth.currentUser) addDoc(collection(db, "shops", shop_id, "shifts"), { userId: auth.currentUser.uid, type: 'in', time: serverTimestamp() }); };
        document.getElementById('clock-out').onclick = () => { if(auth.currentUser) addDoc(collection(db, "shops", shop_id, "shifts"), { userId: auth.currentUser.uid, type: 'out', time: serverTimestamp() }); };
        onSnapshot(query(collection(db, "shops", shop_id, "shifts"), where("userId", "==", auth.currentUser.uid), orderBy("time", "desc")), (snap) => {
            const log = document.getElementById('shift-log'); if (!log) return; log.innerHTML = '';
            snap.forEach(d => {
                const s = d.data(); const icon = s.type === 'in' ? '<div class="bg-brand-50 p-2 rounded-lg text-brand-600"><i class="ph ph-arrow-right"></i></div>' : '<div class="bg-slate-100 p-2 rounded-lg text-slate-500"><i class="ph ph-arrow-left"></i></div>';
                log.innerHTML += `<div class="bg-white p-3 rounded-xl border border-slate-200 flex justify-between items-center text-sm font-bold shadow-sm"><div class="flex items-center gap-3">${icon} ${s.type === 'in' ? 'Clocked In' : 'Clocked Out'}</div><div class="text-slate-400 text-xs">${s.time?.toDate().toLocaleString()}</div></div>`;
            });
        });
    };
    linkButtons('btn-shift', 'btn-shift-m', null, showShiftModal);

    // ---- SETTINGS MODAL (NEW) ----
    const showSettingsModal = () => {
        openModal(`
            <div class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4"><h2 class="text-xl font-bold flex items-center gap-2 text-slate-900"><i class="ph ph-gear text-slate-500"></i> <span data-i18n="set_title">${t('set_title')}</span></h2><button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 bg-slate-50 p-2 rounded-lg transition-all"><i class="ph ph-x text-lg"></i></button></div>
            <div class="space-y-4 bg-slate-50 p-5 rounded-2xl border border-slate-100">
                <div><label data-i18n="set_name" class="block text-xs font-bold text-slate-500 uppercase mb-2">${t('set_name')}</label><input id="set-name" type="text" value="${shop_settings.shopName || shop_name}" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm font-bold"></div>
                <div><label data-i18n="set_foot" class="block text-xs font-bold text-slate-500 uppercase mb-2">${t('set_foot')}</label><input id="set-foot" type="text" value="${shop_settings.footer || 'Thank you!'}" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl text-sm font-bold"></div>
                <div class="pt-4"><button id="save-set-btn" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-sm"><span data-i18n="save">${t('save')}</span></button></div>
            </div>
        `);
        document.getElementById('save-set-btn').onclick = async () => {
            const n = document.getElementById('set-name').value.trim();
            const f = document.getElementById('set-foot').value.trim();
            try {
                await setDoc(doc(db, "shops", shop_id, "settings", "general"), { shopName: n, footer: f }, { merge: true });
                shop_settings = { shopName: n, footer: f };
                shop_name = n; updateText('s-name', n);
                alert(currentLang === 'en' ? "Settings saved." : "ဆက်တင်များကို သိမ်းဆည်းပြီးပါပြီ။");
                closeModal();
            } catch(e) { alert("Error: " + e.message); }
        };
    };
    linkButtons('btn-settings', 'btn-settings-m', null, showSettingsModal);

</script>
</body>
</html>
